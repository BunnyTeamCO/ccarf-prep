<script>
"use strict";
/* ================= DATOS DEL EXAMEN ================= */
const DOMAINS = {
  1:{name:"Agentic Architecture & Orchestration", w:27},
  2:{name:"Tool Design & MCP Integration", w:18},
  3:{name:"Claude Code Configuration & Workflows", w:20},
  4:{name:"Prompt Engineering & Structured Output", w:20},
  5:{name:"Context Management & Reliability", w:15}
};

/* ================= GUÍA DE ESTUDIO (30 temas) ================= */
const TEMAS = [
{id:"1.1",d:1,t:"El agentic loop y stop_reason",x:`
<h4>Explicación</h4><p>Un agente es un bucle: envías request → Claude responde → inspeccionas <b>stop_reason</b> → si es <b>"tool_use"</b>, ejecutas la herramienta, añades el resultado al historial y vuelves a llamar; si es <b>"end_turn"</b>, terminas. El modelo decide qué herramienta llamar según contexto (decisión dirigida por el modelo), no un árbol preconfigurado.</p>
<h4>Ejemplo</h4><p>«¿Dónde está mi pedido #123?» → stop_reason: tool_use pidiendo lookup_order(123) → ejecutas, agregas tool_result, reenvías → Claude responde texto con end_turn → fin.</p>
<h4>Señales de examen</h4><ul><li>Anti-patrones (siempre incorrectos): parsear lenguaje natural para terminar el loop, tope de iteraciones como parada principal, detectar texto del assistant como señal de completitud.</li><li>El tope de iteraciones es solo red de seguridad.</li></ul>`},
{id:"1.2",d:1,t:"Orquestación coordinador-subagente",x:`
<h4>Explicación</h4><p>Arquitectura <b>hub-and-spoke</b>: el coordinador descompone, delega, agrega resultados y enruta TODA la comunicación entre subagentes (observabilidad + errores consistentes). Los subagentes tienen <b>contexto aislado</b>: no heredan el historial. El coordinador selecciona dinámicamente qué subagentes invocar — no siempre el pipeline completo.</p>
<h4>Ejemplo</h4><p>Investigación: coordinador → búsqueda web + análisis de documentos (paralelo) → síntesis → reporte.</p>
<h4>Señales de examen</h4><ul><li>Riesgo clave: <b>descomposición demasiado estrecha</b>. Si «IA en industrias creativas» se descompone solo en arte visual, el reporte omite música, escritura y cine. Los subagentes trabajaron bien: el problema es lo que se les asignó.</li></ul>`},
{id:"1.3",d:1,t:"Invocación de subagentes y paso de contexto",x:`
<h4>Explicación</h4><p>Los subagentes se lanzan con la herramienta <b>Task</b>; el <b>allowedTools</b> del coordinador DEBE incluir "Task". El contexto se pasa <b>explícitamente en el prompt</b> — no hay herencia automática ni memoria compartida. Paralelismo: <b>múltiples Task calls en UNA sola respuesta</b> (no turnos separados). Prompts del coordinador: objetivos y criterios de calidad, no procedimientos rígidos.</p>
<h4>Ejemplo</h4><p>La síntesis necesita los hallazgos previos → se incluyen completos en su prompt, en formato estructurado que separa contenido de metadata (URLs, documentos, páginas) para preservar atribución.</p>
<h4>Señales de examen</h4><ul><li>«El coordinador no puede lanzar subagentes» → falta "Task" en allowedTools.</li><li>fork_session = ramas independientes desde base compartida.</li></ul>`},
{id:"1.4",d:1,t:"Enforcement programático y handoffs",x:`
<h4>Explicación</h4><p>Regla madre: cumplimiento <b>determinístico</b> (identidad antes de operaciones financieras) → <b>enforcement programático</b> (hooks, gates); las instrucciones de prompt tienen tasa de fallo no nula. Un handoff de escalación debe ser <b>estructurado</b>: ID de cliente, causa raíz, monto, acción recomendada — el humano no ve la transcripción.</p>
<h4>Ejemplo</h4><p>Bloquear process_refund hasta que get_customer devuelva ID verificado (prerequisito programático, NO mejorar el system prompt).</p>
<h4>Señales de examen</h4><ul><li>«garantizar / nunca / obligatorio / consecuencias financieras» → hook.</li><li>«consistencia / calibrar / reducir errores» → few-shot + criterios.</li></ul>`},
{id:"1.5",d:1,t:"Hooks del Agent SDK",x:`
<h4>Explicación</h4><p>Dos patrones: (a) <b>PostToolUse</b> intercepta <i>resultados</i> para transformarlos antes de que el modelo los procese; (b) intercepción de <i>llamadas salientes</i> para bloquear acciones que violan políticas y redirigir a workflows alternativos.</p>
<h4>Ejemplos</h4><ul><li>PostToolUse normaliza formatos heterogéneos (timestamps Unix, ISO 8601, códigos numéricos) → formato uniforme.</li><li>Hook que bloquea refunds > $500 y redirige a escalación humana.</li></ul>
<h4>Señales de examen</h4><ul><li>«Datos inconsistentes de varios MCP servers, unificar de forma confiable» → PostToolUse, no «pedirle cuidado» al prompt.</li></ul>`},
{id:"1.6",d:1,t:"Estrategias de descomposición",x:`
<h4>Explicación</h4><p><b>Prompt chaining</b> (pipeline fijo secuencial): workflows predecibles multi-aspecto. Ej.: review → analizar cada archivo individualmente + pasada de integración cross-file (evita dilución de atención). <b>Descomposición dinámica/adaptativa</b>: investigación abierta donde los subtasks emergen de lo descubierto.</p>
<h4>Ejemplo</h4><p>«Añade tests a un codebase legacy» → mapear estructura, identificar áreas de alto impacto, plan priorizado que se adapta según dependencias descubiertas.</p>
<h4>Señales de examen</h4><ul><li>Tarea predecible y multi-aspecto → chaining; abierta y exploratoria → dinámica.</li></ul>`},
{id:"1.7",d:1,t:"Sesiones: --resume, fork_session, empezar de cero",x:`
<h4>Explicación</h4><p><b>--resume &lt;nombre&gt;</b>: continuar sesión previa nombrada. <b>fork_session</b>: ramas independientes desde base común (comparar dos estrategias desde el mismo análisis). Si los archivos cambiaron: <b>informar al agente qué cambió</b> para re-análisis dirigido. Si los tool results están <b>obsoletos</b>: mejor sesión nueva con resumen estructurado inyectado.</p>
<h4>Señales de examen</h4><ul><li>«Retomas un análisis pero el código cambió mucho» → nueva sesión + resumen, NO --resume a ciegas.</li></ul>`},
{id:"2.1",d:2,t:"Tool descriptions efectivas",x:`
<h4>Explicación</h4><p>La descripción es el <b>mecanismo principal</b> de selección de herramientas del LLM. Descripciones mínimas → selección no confiable. Una buena descripción incluye: formatos de entrada, queries de ejemplo, casos borde y <b>límites</b> («usa esto y no aquello cuando…»). Revisa también el system prompt por instrucciones sensibles a keywords que anulen buenas descripciones.</p>
<h4>Ejemplo</h4><p>get_customer vs lookup_order con descripciones casi idénticas → primer paso: <b>expandir descripciones</b>. NO few-shot (parche), NO routing layer (sobre-ingeniería), NO consolidar (demasiado esfuerzo para un «primer paso»).</p>
<h4>Señales de examen</h4><ul><li>Remedios: renombrar (analyze_content → extract_web_results), dividir tools genéricas en específicas con contratos claros.</li></ul>`},
{id:"2.2",d:2,t:"Errores estructurados MCP",x:`
<h4>Explicación</h4><p>Flag <b>isError</b> + metadata: <b>errorCategory</b> (transient / validation / business / permission), <b>isRetryable</b>, descripción legible. «Operation failed» genérico impide recuperación. Distinción crítica: <b>fallo de acceso</b> (timeout → decidir retry) ≠ <b>vacío válido</b> (query exitosa sin matches). Subagentes recuperan localmente lo transitorio; propagan solo lo irresoluble <b>con parciales y qué se intentó</b>.</p>
<h4>Ejemplo</h4><p>Refund fuera de ventana → {isError:true, errorCategory:"business", isRetryable:false, message:"excede ventana de 30 días"} → el agente explica, no reintenta.</p>`},
{id:"2.3",d:2,t:"Distribución de tools y tool_choice",x:`
<h4>Explicación</h4><p>Demasiadas herramientas (18 vs 4-5) degradan la selección → <b>acceso scoped por rol</b>. Excepción: tool cross-rol acotada para necesidades de alta frecuencia. <b>tool_choice</b>: "auto" (puede responder texto), "any" (debe llamar alguna tool), forzada {"type":"tool","name":"…"} (debe llamar ESA).</p>
<h4>Ejemplo</h4><p>Síntesis verifica hechos constantemente (85% simples) → darle verify_fact acotada; el 15% complejo vía coordinador. NO darle todas las tools de búsqueda.</p>
<h4>Señales de examen</h4><ul><li>«Garantizar output estructurado con varias schemas y tipo desconocido» → "any". «Asegurar que X corra primero» → forzada.</li></ul>`},
{id:"2.4",d:2,t:"Configuración de MCP servers",x:`
<h4>Explicación</h4><p><b>.mcp.json</b> (proyecto): compartido por git con el equipo. <b>~/.claude.json</b> (usuario): personal/experimental. Variables de entorno: <b>\${GITHUB_TOKEN}</b> — credenciales sin commitear secretos. Tools de TODOS los servers disponibles simultáneamente. <b>MCP resources</b>: catálogos de contenido (schemas BD, jerarquías de docs) para evitar tool calls exploratorios. Preferir servers comunitarios (Jira) sobre custom.</p>
<h4>Señales de examen</h4><ul><li>«El agente prefiere Grep sobre tu MCP tool más capaz» → mejorar la descripción de la MCP tool.</li></ul>`},
{id:"2.5",d:2,t:"Herramientas built-in",x:`
<h4>Explicación</h4><p><b>Grep</b> = buscar contenido (funciones, errores, imports). <b>Glob</b> = rutas/nombres por patrón (**/*.test.tsx). <b>Read/Write</b> = archivo completo; <b>Edit</b> = modificación puntual con texto ancla único. Edit falla por texto no único → fallback <b>Read + Write</b>. Exploración incremental: Grep para entry points → Read siguiendo imports → NO leer todo por adelantado.</p>
<h4>Señales de examen</h4><ul><li>«Encontrar archivos de test» → Glob. «Quién llama a esta función» → Grep.</li></ul>`},
{id:"3.1",d:3,t:"Jerarquía CLAUDE.md",x:`
<h4>Explicación</h4><p>Tres niveles: <b>usuario</b> (~/.claude/CLAUDE.md — solo tú, NO se comparte por git), <b>proyecto</b> (raíz o .claude/ — compartido), <b>directorio</b> (subdirectorios). Modularidad: <b>@import</b> para estándares externos; <b>.claude/rules/</b> divide un CLAUDE.md monolítico por temas. Diagnóstico: <b>/memory</b> muestra qué archivos están cargados.</p>
<h4>Señales de examen</h4><ul><li>Trampa clásica: «un nuevo miembro no recibe las instrucciones» → estaban a nivel usuario del autor; deben ir a nivel proyecto.</li></ul>`},
{id:"3.2",d:3,t:"Slash commands y skills",x:`
<h4>Explicación</h4><p>Commands de proyecto: <b>.claude/commands/</b> (git). Personales: ~/.claude/commands/. Skills: <b>.claude/skills/</b> con SKILL.md y frontmatter: <b>context: fork</b> (contexto aislado — outputs verbosos no contaminan la conversación), <b>allowed-tools</b> (restringe herramientas), <b>argument-hint</b> (pide parámetros). Skills = invocación bajo demanda; CLAUDE.md = estándares siempre cargados. Variante personal de skill de equipo → ~/.claude/skills/ con OTRO nombre.</p>
<h4>Señales de examen</h4><ul><li>«/review para todo el equipo al clonar» → .claude/commands/. Distractor: config.json con array de commands (no existe).</li></ul>`},
{id:"3.3",d:3,t:"Reglas por ruta (glob patterns)",x:`
<h4>Explicación</h4><p>Archivos en <b>.claude/rules/</b> con frontmatter YAML <b>paths: ["glob/**/*"]</b> → la regla carga SOLO al editar archivos que matchean. Ventaja sobre CLAUDE.md por directorio: aplican por <b>tipo de archivo sin importar ubicación</b> (**/*.test.tsx para tests dispersos). Reduce contexto irrelevante.</p>
<h4>Señales de examen</h4><ul><li>Convenciones para archivos dispersos por el codebase → rules con glob, NO CLAUDE.md por subdirectorio, NO confiar en que Claude «infiera».</li></ul>`},
{id:"3.4",d:3,t:"Plan mode vs ejecución directa",x:`
<h4>Explicación</h4><p><b>Plan mode</b>: cambios de gran escala, múltiples enfoques válidos, decisiones arquitectónicas, multi-archivo (migraciones 45+ archivos, monolito→microservicios). Explora y diseña antes de comprometerse → evita rework. <b>Ejecución directa</b>: cambios simples y delimitados (bug de un archivo con stack trace). <b>Explore subagent</b>: aísla descubrimiento verboso, devuelve resúmenes. Combinación válida: plan para investigar + directa para implementar.</p>
<h4>Señales de examen</h4><ul><li>Distractor: «empieza directo y cambia a plan si se complica» — la complejidad ya está declarada.</li></ul>`},
{id:"3.5",d:3,t:"Refinamiento iterativo",x:`
<h4>Explicación</h4><p><b>Ejemplos input/output concretos (2-3)</b>: lo más efectivo cuando la prosa se interpreta inconsistente. <b>Test-driven iteration</b>: tests primero, iterar compartiendo fallos. <b>Interview pattern</b>: Claude pregunta para descubrir consideraciones no anticipadas (invalidación de caché, modos de fallo) en dominios desconocidos. Issues que <b>interactúan</b> → un solo mensaje detallado; <b>independientes</b> → secuencial.</p>
<h4>Señales de examen</h4><ul><li>«Migración falla con nulls» → test cases concretos con input y output esperado.</li></ul>`},
{id:"3.6",d:3,t:"Claude Code en CI/CD",x:`
<h4>Explicación</h4><p><b>-p / --print</b>: modo no interactivo (sin esto el job de CI cuelga; CLAUDE_HEADLESS y --batch NO existen). <b>--output-format json + --json-schema</b>: output parseable para comentarios inline en PRs. CLAUDE.md da contexto al CI (estándares, fixtures, criterios). <b>Aislamiento de sesión</b>: la sesión que generó el código es peor revisándolo → instancia independiente. Re-runs: incluir hallazgos previos, pedir solo issues nuevos. Test generation: incluir tests existentes para no duplicar.</p>`},
{id:"4.1",d:4,t:"Criterios explícitos vs instrucciones vagas",x:`
<h4>Explicación</h4><p>«Sé conservador» o «solo alta confianza» NO mejoran precisión. Funciona: criterios <b>categóricos y específicos</b> — «flaggea comentarios solo cuando el comportamiento descrito contradice el código real». Los falsos positivos destruyen la confianza incluso en categorías precisas → táctica válida: <b>desactivar temporalmente</b> categorías con alto FP mientras se mejoran.</p>
<h4>Ejemplo</h4><p>Severidad inconsistente → criterios explícitos de severidad <b>con ejemplos de código por nivel</b>.</p>
<h4>Señales de examen</h4><ul><li>Distractor recurrente: filtrar por «confianza auto-reportada».</li></ul>`},
{id:"4.2",d:4,t:"Few-shot prompting",x:`
<h4>Explicación</h4><p>La técnica más efectiva para <b>consistencia de formato</b> y <b>casos ambiguos</b> cuando las instrucciones no bastan. <b>2-4 ejemplos dirigidos</b> que muestren el razonamiento de por qué una acción sobre alternativas plausibles. Generaliza a patrones nuevos. Reduce alucinación en extracción con formatos variados.</p>
<h4>Ejemplo</h4><p>Escalación mal calibrada → criterios explícitos + few-shot de «cuándo escalar vs resolver».</p>
<h4>Señales de examen</h4><ul><li>Cuándo NO: si el problema es descripción pobre de tools (arregla la descripción) o requiere garantía determinística (hook).</li></ul>`},
{id:"4.3",d:4,t:"Structured output con tool_use + JSON schema",x:`
<h4>Explicación</h4><p><b>Tool use + JSON schema = lo más confiable</b>: elimina errores de sintaxis, NO los semánticos (items que no suman el total). Schema: campos <b>opcionales/nullable</b> cuando el dato puede faltar → evita que el modelo <b>fabrique valores</b>; enums con <b>"other" + detalle</b> y <b>"unclear"</b> para ambiguos; reglas de normalización en el prompt.</p>
<h4>Señales de examen</h4><ul><li>«El modelo inventa fechas» → campo nullable, NO «no inventes» en el prompt.</li><li>tool_choice "any" con múltiples schemas y tipo desconocido; forzada para garantizar una específica.</li></ul>`},
{id:"4.4",d:4,t:"Validación, retry y feedback loops",x:`
<h4>Explicación</h4><p><b>Retry-with-error-feedback</b>: reenviar documento + extracción fallida + errores específicos de validación. Límite: el retry es <b>inútil si la información no está en el documento</b> (vs errores de formato, que sí se corrigen). Auto-validación semántica: calculated_total junto a stated_total, boolean conflict_detected. Campo detected_pattern para analizar falsos positivos.</p>
<h4>Señales de examen</h4><ul><li>«¿Cuándo NO sirve reintentar?» → dato en documento externo no proporcionado.</li></ul>`},
{id:"4.5",d:4,t:"Batch processing (Message Batches API)",x:`
<h4>Explicación</h4><p><b>50% descuento, ventana hasta 24h, sin SLA de latencia, sin tool calling multi-turno</b>. <b>custom_id</b> correlaciona request/response y permite reenviar SOLO fallidos (ej. chunking de documentos grandes). Apto: reportes nocturnos, auditorías semanales. NO apto: checks bloqueantes pre-merge. Refinar el prompt en una muestra ANTES del batch masivo.</p>
<h4>Señales de examen</h4><ul><li>Dos workflows, uno bloqueante y uno nocturno → batch solo el nocturno.</li></ul>`},
{id:"4.6",d:4,t:"Multi-instancia y multi-pass review",x:`
<h4>Explicación</h4><p><b>El auto-review falla</b>: el modelo retiene su contexto de razonamiento y no cuestiona sus decisiones → <b>segunda instancia independiente</b>. <b>Multi-pass</b> para PRs grandes: pasada local por archivo + pasada de integración cross-file → evita dilución de atención y hallazgos contradictorios.</p>
<h4>Señales de examen</h4><ul><li>Distractor: «modelo con más contexto» — no arregla la calidad de atención.</li></ul>`},
{id:"5.1",d:5,t:"Contexto en interacciones largas",x:`
<h4>Explicación</h4><p>El resumen progresivo pierde números, fechas y expectativas → bloque persistente de <b>«case facts»</b> en cada prompt, fuera del historial resumido. <b>Lost in the middle</b>: el modelo procesa bien inicio y final, omite el medio → resumen clave al INICIO + headers de sección. <b>Recortar tool outputs</b> a campos relevantes (40 campos cuando importan 5). Upstream devuelve <b>datos estructurados</b>, no prosa, cuando el downstream tiene poco contexto.</p>
<h4>Señales de examen</h4><ul><li>«A los 30 turnos olvida el monto» → case facts, NO «resumir más seguido».</li></ul>`},
{id:"5.2",d:5,t:"Escalación y ambigüedad",x:`
<h4>Explicación</h4><p>Triggers correctos: (a) el cliente <b>pide un humano</b> → honrar de inmediato; (b) <b>gaps de política</b> (el caso no está cubierto); (c) incapacidad de progresar. NO confiables: sentimiento, confianza auto-reportada. Frustración + caso resoluble → reconocer y ofrecer resolver; escalar si insiste. Múltiples matches de cliente → <b>pedir identificadores adicionales</b>, nunca heurística.</p>`},
{id:"5.3",d:5,t:"Propagación de errores multi-agente",x:`
<h4>Explicación</h4><p>El error propagado incluye: <b>tipo de fallo, qué se intentó, parciales, alternativas</b> → el coordinador decide (retry modificado, alternativa, continuar con parciales). Anti-patrones: status genérico, suprimir error (vacío como éxito), matar todo el workflow. La síntesis anota <b>coverage gaps</b>: qué está bien soportado y qué áreas quedaron sin fuentes.</p>`},
{id:"5.4",d:5,t:"Contexto en codebases grandes",x:`
<h4>Explicación</h4><p>Señal de degradación: responde con «patrones típicos» en vez de clases específicas descubiertas. Remedios: <b>scratchpad files</b> (persistir hallazgos), <b>delegar a subagentes</b> lo verboso, <b>resumir antes de cada fase</b> e inyectar, <b>/compact</b> en sesiones largas, <b>crash recovery con manifests</b> (cada agente exporta estado; el coordinador lo carga al reanudar).</p>`},
{id:"5.5",d:5,t:"Human review y calibración de confianza",x:`
<h4>Explicación</h4><p>Un accuracy agregado (97%) puede <b>ocultar mal desempeño por tipo de documento o campo</b> → validar por segmento antes de automatizar. <b>Muestreo aleatorio estratificado</b> de extracciones de alta confianza: mide error real, detecta patrones nuevos. <b>Confidence scores por campo</b>, calibrados con sets etiquetados → enrutar a humano lo de baja confianza o fuentes contradictorias.</p>`},
{id:"5.6",d:5,t:"Procedencia y manejo de incertidumbre",x:`
<h4>Explicación</h4><p>La atribución se pierde al resumir → <b>mapeos claim-source</b> (URL, documento, excerpt, fecha) que la síntesis PRESERVA. Estadísticas en conflicto de fuentes creíbles → <b>anotar con atribución</b>, nunca elegir arbitrariamente. <b>Fechas de publicación obligatorias</b> → diferencias temporales no son contradicciones. Reportes: hallazgos <b>establecidos vs disputados</b>. Renderizar por tipo: finanzas en tablas, noticias en prosa.</p>`}
];
/* ================= DIAGRAMAS SVG ================= */
function _box(x,y,w,h,l1,l2,stroke){
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="9" fill="var(--panel)" stroke="${stroke}" stroke-width="1.6"/>`+
  `<text x="${x+w/2}" y="${y+(l2?h/2-3:h/2+4)}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text)">${l1}</text>`+
  (l2?`<text x="${x+w/2}" y="${y+h/2+14}" text-anchor="middle" font-size="10.5" fill="var(--muted)">${l2}</text>`:"");
}
function svgFlow(steps,opts){
  opts=opts||{};
  const bw=122,bh=48,gap=34,y=8;
  const W=8+steps.length*bw+(steps.length-1)*gap+8, H=opts.loop?100:64;
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img">`;
  steps.forEach((st,i)=>{
    const x=8+i*(bw+gap);
    s+=_box(x,y,bw,bh,st.t,st.s,st.gate?"var(--accent)":"var(--blue)");
    if(i<steps.length-1){
      const ax=x+bw, ax2=x+bw+gap-4, ay=y+bh/2;
      s+=`<line x1="${ax}" y1="${ay}" x2="${ax2-6}" y2="${ay}" stroke="var(--muted)" stroke-width="1.6"/><polygon points="${ax2},${ay} ${ax2-8},${ay-4.5} ${ax2-8},${ay+4.5}" fill="var(--muted)"/>`;
    }
  });
  if(opts.loop){
    const fc=8+bw/2, lc=8+(steps.length-1)*(bw+gap)+bw/2;
    s+=`<path d="M ${lc} ${y+bh+4} L ${lc} 82 L ${fc} 82 L ${fc} ${y+bh+10}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 4"/>`+
       `<polygon points="${fc},${y+bh+4} ${fc-4.5},${y+bh+12} ${fc+4.5},${y+bh+12}" fill="var(--accent)"/>`+
       `<text x="${(fc+lc)/2}" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="var(--accent)">${opts.loopLabel||"repite"}</text>`;
  }
  return s+"</svg>";
}
function svgVs(tL,iL,tR,iR){
  const pw=248,gap=16,rows=Math.max(iL.length,iR.length),H=40+rows*21+10;
  let s=`<svg viewBox="0 0 ${pw*2+gap+8} ${H}" xmlns="http://www.w3.org/2000/svg" role="img">`;
  [[4,tL,iL,"var(--red)"],[4+pw+gap,tR,iR,"var(--green)"]].forEach(p=>{
    const [x,t,items,c]=p;
    s+=`<rect x="${x}" y="4" width="${pw}" height="${H-8}" rx="10" fill="var(--panel)" stroke="${c}" stroke-width="1.6"/>`+
       `<rect x="${x}" y="4" width="${pw}" height="28" rx="10" fill="${c}" fill-opacity="0.16"/>`+
       `<text x="${x+pw/2}" y="23" text-anchor="middle" font-size="12.5" font-weight="800" fill="var(--text)">${t}</text>`;
    items.forEach((it,i)=>{ s+=`<text x="${x+14}" y="${52+i*21}" font-size="11.5" fill="var(--text)">• ${it}</text>`; });
  });
  return s+"</svg>";
}
function svgHub(center,spokes){
  const H=Math.max(spokes.length*54,60)+8;
  let s=`<svg viewBox="0 0 530 ${H}" xmlns="http://www.w3.org/2000/svg" role="img">`;
  const cy=H/2;
  spokes.forEach((sp,i)=>{
    const sy=8+i*54+22;
    s+=`<line x1="158" y1="${cy}" x2="300" y2="${sy}" stroke="var(--muted)" stroke-width="1.4"/>`;
  });
  s+=_box(8,cy-24,150,48,center,null,"var(--accent)");
  spokes.forEach((sp,i)=>{
    const sy=8+i*54;
    s+=`<rect x="300" y="${sy}" width="224" height="44" rx="9" fill="var(--panel)" stroke="var(--blue)" stroke-width="1.5"/>`+
       `<text x="${412}" y="${sy+27}" text-anchor="middle" font-size="11.5" font-weight="600" fill="var(--text)">${sp}</text>`;
  });
  return s+"</svg>";
}
function svgStack(layers){
  const H=layers.length*50+6;
  let s=`<svg viewBox="0 0 530 ${H}" xmlns="http://www.w3.org/2000/svg" role="img">`;
  const cols=["var(--accent)","var(--blue)","var(--green)","var(--yellow)"];
  layers.forEach((l,i)=>{
    const w=500-i*56, x=(530-w)/2, y=4+i*50;
    s+=`<rect x="${x}" y="${y}" width="${w}" height="42" rx="9" fill="var(--panel)" stroke="${cols[i%4]}" stroke-width="1.6"/>`+
       `<text x="265" y="${y+26}" text-anchor="middle" font-size="11.8" font-weight="600" fill="var(--text)">${l}</text>`;
  });
  return s+"</svg>";
}

"3.1":{e:"🏠",a:"Las reglas de la casa: las de toda la familia están pegadas en la cocina (nivel proyecto: las ve todo el equipo vía git), tus notas privadas viven en tu cuaderno (nivel usuario: nadie más las hereda — la trampa clásica del compañero nuevo), y las reglas del cuarto de juegos solo aplican ahí (nivel directorio). Si la lista de la cocina crece a 800 renglones, se divide en carpetas por tema (.claude/rules/). ¿Dudas de qué reglas están activas? Se revisa la lista (/memory).",
 g:()=>svgStack(["🏢 Proyecto — todo el equipo, viaja por git","🏠 Usuario ~/.claude — solo tú, NO viaja por git","📁 Directorio — solo esa carpeta"]),
 f:"Lo del equipo al proyecto, lo tuyo al usuario, lo local al directorio — y /memory para auditar."},
"3.2":{e:"🔔",a:"Timbre vs electrodoméstico: un slash command es un timbre — lo presionas y hace su función, y si está en la entrada del edificio (.claude/commands/) todos los vecinos pueden usarlo. Una skill es un electrodoméstico con manual: puede pedirte parámetros si la enciendes sin nada (argument-hint), trabajar en su propio cuarto sin ensuciar la casa (context: fork) y con acceso limitado a los enchufes (allowed-tools).",
 g:()=>svgVs("🔔 Slash command",[".claude/commands/","Atajo directo","Equipo vía git"],"🎛️ Skill",["SKILL.md + frontmatter","context: fork aísla","allowed-tools limita"]),
 f:"Command = atajo compartible; skill = mini-programa con permisos y cuarto propio."},
"3.3":{e:"🥼",a:"La bata de laboratorio: la regla «usar bata» no aplica en toda la escuela — se activa solo cuando entras a un laboratorio, sin importar en qué piso esté. Las rules con glob (paths: [\"**/*.test.tsx\"]) se cargan solo al editar archivos que coinciden con el patrón, estén en la carpeta que estén. Un cartel por salón (CLAUDE.md por directorio) no funciona cuando hay laboratorios repartidos por todo el edificio.",
 g:()=>svgFlow([{t:"Editas",s:"Button.test.tsx"},{t:"¿Match glob?",s:"**/*.test.tsx",gate:true},{t:"Regla cargada",s:"solo aquí ✅"}]),
 f:"Las rules con glob siguen al TIPO de archivo, no a la carpeta."},
"3.4":{e:"📐",a:"Arquitecto vs foco: para remodelar la casa entera primero se dibujan planos (plan mode) — nadie tumba paredes «a ver qué pasa». Para cambiar un foco quemado: escalera y listo (ejecución directa). Y si la remodelación exige revisar todos los rincones, mandas a un ayudante a inspeccionar y que te traiga SOLO el resumen (Explore subagent), no las 4 horas de video.",
 g:()=>svgVs("📐 Plan mode",["Gran escala","Decisiones de arquitectura","Explora antes de tocar"],"🔧 Directa",["Cambio puntual","Bug con stack trace","Sin ceremonia"]),
 f:"Grande y con decisiones → plan mode; pequeño y claro → directo."},
"3.5":{e:"🛏️",a:"Enseñar a hacer la cama: mostrarla hecha 2 veces enseña más que un discurso de 20 minutos (ejemplos input/output). Si el niño la hace mal, le señalas exactamente qué arruga quedó (test-driven: compartir el fallo), no le repites el discurso. Antes de encargarle algo que nunca ha hecho, deja que ÉL te pregunte sus dudas (interview pattern). Y si la sábana y la cobija se enredan entre sí, se arreglan juntas; si son cosas sueltas, una por una.",
 g:()=>svgFlow([{t:"2-3 ejemplos",s:"input/output"},{t:"Claude capta",s:"el patrón"},{t:"Tests fallan →",s:"le das los fallos"},{t:"♻️ Mejora"}]),
 f:"2-3 ejemplos concretos valen más que mil palabras de especificación."},
"3.6":{e:"🏭",a:"La fábrica automática: un robot de la línea nocturna no puede detenerse a preguntar «¿continúo?» a las 3 AM — corre en modo automático (-p) y entrega informes en formato estándar que las máquinas siguientes entienden (--output-format json + schema). El manual de calidad de la fábrica (CLAUDE.md) le dice qué revisar. Y el inspector de calidad nunca es el mismo robot que armó la pieza (instancia independiente para review).",
 g:()=>svgFlow([{t:"CI corre",s:"claude -p"},{t:"json +",s:"--json-schema"},{t:"💬 Comentarios",s:"en el PR"}]),
 f:"-p para que el CI no se cuelgue, JSON con schema para que las máquinas entiendan, otra instancia para revisar."},
"4.1":{e:"🙃",a:"«Pórtate bien»: no funciona porque cada niño lo interpreta a su modo. «No corras junto a la piscina y no comas dulces antes de cenar» sí funciona. Los criterios explícitos y categóricos (qué reportar, qué omitir, con ejemplos por nivel) le ganan siempre a «sé conservador». Y si una regla genera regaños injustos todo el día, se suspende esa regla mientras se redacta mejor — o los niños dejarán de escuchar TODAS las reglas.",
 g:()=>svgVs("😵 Vago",["«sé conservador»","«alta confianza»","No calibra nada"],"🎯 Explícito",["Qué reportar","Qué omitir","Ejemplos por nivel"]),
 f:"Criterios categóricos con ejemplos > «sé conservador»."},
"4.2":{e:"🎨",a:"Aprender con ejemplos: antes de pedirle al niño que dibuje un gato, le muestras 3 dibujos de gatos — incluyendo uno difícil (un gato dormido hecho bolita) explicando POR QUÉ es un gato (el razonamiento). Así aprende a reconocer gatos nuevos que jamás ha visto, no a copiar tus tres dibujos. 2-4 ejemplos bien elegidos, apuntando a los casos ambiguos.",
 g:()=>svgFlow([{t:"2-4 ejemplos",s:"con razonamiento"},{t:"Ambiguos",s:"resueltos"},{t:"Generaliza ✨",s:"a casos nuevos"}]),
 f:"Pocos ejemplos bien elegidos enseñan el criterio, no solo el caso."},
"4.3":{e:"🍪",a:"El molde de galletas: con molde (tool_use + JSON schema) TODAS las galletas salen con la forma correcta — es imposible que salga un triángulo (error de sintaxis eliminado). Pero el molde no garantiza el sabor (errores semánticos): la masa puede llevar sal en vez de azúcar. Y si la receta no trae chocolate, el molde no debe obligarte a inventarlo: se deja el hueco vacío (campo nullable) en vez de rellenarlo con cualquier cosa.",
 g:()=>svgFlow([{t:"📄 Documento",s:"desordenado"},{t:"🍪 tool_use",s:"+ schema",gate:true},{t:"Sintaxis ✅",s:"Semántica ⚠️"}]),
 f:"El schema garantiza la forma, nunca el contenido: valida la semántica aparte."},
"4.4":{e:"✏️",a:"Corregir la tarea: si el niño sumó mal, le marcas el error exacto y lo corrige (retry con el error de validación en la mano). Pero si la respuesta no está en su libro, repetirle «inténtalo otra vez» no sirve de nada — el dato simplemente no está ahí (retry inútil). Truco extra: pedirle que sume él mismo el total y lo compare con el que copió (calculated_total vs stated_total) hace que se atrape sus propios errores.",
 g:()=>svgVs("✅ Retry sirve",["Error de formato","Estructura mal","Feedback exacto"],"❌ Retry inútil",["El dato NO está","Doc externo falta","Repetir no ayuda"]),
 f:"Reintenta con el error exacto en la mano; si el dato no existe, no reintentes."},
"4.5":{e:"📮",a:"Carta vs mensajero: el correo ordinario cuesta la mitad y llega «en algún momento de mañana» (Batch API: -50%, hasta 24h, sin SLA) — perfecto para el reporte mensual. Para el contrato que se firma HOY pagas mensajero urgente (API síncrona). Nunca mandas por correo ordinario algo que tiene a alguien esperando en la puerta (checks pre-merge). Y cada sobre lleva remitente (custom_id): si 3 se devuelven, reenvías solo esos 3.",
 g:()=>svgVs("🐢 Batch API",["-50% costo","Hasta 24h, sin SLA","Nocturno / semanal"],"🐇 Síncrono",["Respuesta inmediata","Camino crítico","Checks pre-merge"]),
 f:"Batch: mitad de precio, cero prisa. Jamás en el camino crítico."},
"4.6":{e:"🪞",a:"Revisar tu propio examen: siempre te parece que está perfecto — tu cerebro recuerda lo que QUISISTE escribir, no lo que escribiste (el generador retiene su razonamiento). Por eso lo revisa un compañero que no sabe qué quisiste decir (instancia independiente). Y un examen de 14 páginas no se corrige de una ojeada: página por página, y al final una pasada para ver si las respuestas se contradicen entre sí (multi-pass).",
 g:()=>svgVs("🪞 Auto-review",["Recuerda su lógica","No se cuestiona","Sesgo del creador"],"👓 2ª instancia",["Ojos frescos","Sin contexto previo","Atrapa más"]),
 f:"Ojos frescos ven más: instancia independiente y revisión por pasadas."},
"5.1":{e:"📌",a:"El post-it en la nevera: la conversación familiar fluye y se olvida (historial resumido), pero el teléfono del pediatra y la fecha de la vacuna están en un post-it siempre visible (case facts: montos, fechas, IDs). En una charla larga, lo importante se dice al principio y al final — lo del medio se pierde (lost in the middle). Y si el vecino te cuenta 40 detalles de su viaje cuando solo preguntaste la fecha, te quedas con la fecha (trimming de tool outputs).",
 g:()=>svgFlow([{t:"Historial",s:"resumido 🌫️"},{t:"📌 Case facts",s:"montos·fechas·IDs",gate:true},{t:"En cada prompt",s:"sin perderse"}]),
 f:"Lo que no puede olvidarse no se resume: va en el bloque de case facts."},
"5.2":{e:"🍼",a:"El niñero: si el niño pide a sus papás, se les llama YA — sin intentar distraerlo primero (cliente pide humano → escalar de inmediato). Si pasa algo que las instrucciones no cubren («¿puede comer esto?»), se pregunta (gap de política → escalar). Pero si solo está enfadado y el problema es resoluble, primero se le atiende: llorar no es motivo automático de llamada (sentimiento ≠ complejidad). Y si hay dos niños con el mismo nombre, se pregunta el apellido — no se adivina (múltiples matches → pedir identificadores).",
 g:()=>svgStack(["🔴 Pide humano → escalar YA","🟡 La política no cubre el caso → escalar","🟢 Resoluble (aunque enojado) → resolver"]),
 f:"Pide humano → ya. Política muda → escala. ¿Enojado pero resoluble? → resuelve."},
"5.3":{e:"🧭",a:"El explorador: vuelve al campamento y nunca dice solo «fracasé». Dice: «no pude cruzar el río (tipo de fallo), lo intenté por el puente norte (qué se intentó), traje estas bayas del camino (resultados parciales) y creo que se puede por el sur (alternativa)». Con eso el líder decide. Los que dicen «todo bien» cuando no cruzaron (vacío como éxito) o hacen que se cancele TODA la expedición por un río, ponen en riesgo la misión.",
 g:()=>svgFlow([{t:"Subagente",s:"falla ⏱️"},{t:"tipo + intento",s:"+ parciales"},{t:"🧭 Coordinador",s:"decide"}]),
 f:"Los errores viajan con tipo, intento, parciales y alternativas — nunca «falló» a secas."},
"5.4":{e:"📓",a:"El diario de expedición: en una travesía larga la memoria falla — el explorador empieza a hablar de «ríos típicos» en vez del río que cruzó el martes (degradación de contexto). Por eso anota los hallazgos en su diario (scratchpad) y consulta el diario, no su memoria. Los mapas de zonas específicas los levantan los ayudantes (subagentes) y le entregan solo el mapa. Antes de cada nueva etapa se resume la anterior, se aligera la mochila (/compact), y si hay que acampar de emergencia, todo queda empacado y etiquetado para retomar (manifests).",
 g:()=>svgHub("🧠 Agente principal",["📝 Scratchpad de hallazgos","🕵️ Subagentes investigan","🗜️ /compact en sesiones largas","📦 Manifests p/ crash recovery"]),
 f:"La memoria larga vive en archivos: scratchpads, resúmenes y manifests."},
"5.5":{e:"🍲",a:"Probar la sopa: una cucharada de UNA olla no te dice si las 20 ollas del banquete están buenas (accuracy agregado engaña). Pruebas cucharadas de ollas distintas, incluidas las que «seguro están bien» (muestreo estratificado de alta confianza), y descubres que justo la olla de los niños está salada (mal desempeño en un segmento). Solo entonces decides qué ollas ya no necesitan catador (reducir review humano) — y el catador escaso se reserva para las ollas dudosas (routing por confianza).",
 g:()=>svgFlow([{t:"97% global",s:"🤔 ¿seguro?"},{t:"🔬 Segmentar",s:"tipo y campo",gate:true},{t:"Facturas: 82%",s:"😱 detectado"}]),
 f:"Desconfía del promedio: mide por segmento y muestrea lo «seguro»."},
"5.6":{e:"🕵️",a:"La abuela y el chisme: siempre pregunta «¿quién te lo dijo y cuándo?». Cada dato viaja con su fuente y su fecha (claim-source mapping) — y al resumir el chisme para contarlo, la fuente NO se pierde. Si dos primas cuentan versiones distintas, se cuentan AMBAS con nombre y apellido (anotar el conflicto), no eliges la que más te gusta. Y a veces no se contradicen: una habla de 2024 y la otra de 2026 (fechas evitan falsas contradicciones).",
 g:()=>svgFlow([{t:"📊 Dato"},{t:"🔗 + fuente",s:"📅 + fecha"},{t:"Conflicto →",s:"anotar ambos"}]),
 f:"Cada afirmación con su fuente y su fecha; los conflictos se anotan, no se eligen."}

/* ================= FLASHCARDS (repetición espaciada) ================= */
const CARDS = [
{d:1,q:"¿Qué dos valores de stop_reason controlan el agentic loop y qué haces con cada uno?",a:"\"tool_use\" → ejecutar la herramienta, añadir tool_result al historial y reenviar. \"end_turn\" → terminar el loop."},
{d:1,q:"Tres anti-patrones de terminación del agentic loop",a:"1) Parsear lenguaje natural para decidir si terminó. 2) Tope de iteraciones como parada principal (solo es red de seguridad). 3) Detectar texto del assistant como señal de completitud."},
{d:1,q:"¿Qué heredan los subagentes del coordinador?",a:"NADA automáticamente. Contexto aislado: todo lo que necesiten debe pasarse explícitamente en su prompt."},
{d:1,q:"¿Qué requisito tiene el coordinador para poder lanzar subagentes?",a:"Su allowedTools debe incluir \"Task\" (la herramienta Task es el mecanismo de spawning)."},
{d:1,q:"¿Cómo se lanzan subagentes EN PARALELO?",a:"Emitiendo múltiples Task tool calls en UNA sola respuesta del coordinador (no en turnos separados)."},
{d:1,q:"Regla madre: ¿cuándo hook y cuándo prompt?",a:"\"Garantizar / nunca / obligatorio / consecuencias financieras\" → hook/programático (determinístico). \"Consistencia / calibrar / reducir errores\" → few-shot + criterios explícitos (probabilístico)."},
{d:1,q:"¿Para qué sirve un hook PostToolUse?",a:"Intercepta RESULTADOS de herramientas para transformarlos antes de que el modelo los procese (ej.: normalizar timestamps Unix/ISO 8601/códigos a un formato uniforme)."},
{d:1,q:"Prompt chaining vs descomposición dinámica",a:"Chaining (pipeline fijo): workflows predecibles multi-aspecto (review por archivo + pasada de integración). Dinámica: tareas abiertas donde los subtasks emergen de lo descubierto."},
{d:1,q:"El código cambió mucho desde tu última sesión de análisis. ¿--resume o sesión nueva?",a:"Sesión nueva con resumen estructurado inyectado. --resume solo si el contexto previo sigue siendo mayormente válido (y avisando qué archivos cambiaron)."},
{d:1,q:"¿Qué es fork_session?",a:"Crear ramas independientes desde una base de análisis compartida, para explorar enfoques divergentes (ej.: comparar dos estrategias de testing)."},
{d:1,q:"¿Qué contiene un handoff estructurado de escalación?",a:"ID de cliente, causa raíz, monto, acción recomendada — porque el humano no tiene acceso a la transcripción."},
{d:1,q:"Reporte incompleto pero todos los subagentes completaron bien su tarea. ¿Causa raíz típica?",a:"Descomposición demasiado estrecha del coordinador: las asignaciones no cubrieron todos los dominios del tema."},
{d:1,q:"¿Cómo deben ser los prompts del coordinador a sus subagentes?",a:"Objetivos de investigación y criterios de calidad — no procedimientos paso a paso rígidos (permite adaptabilidad)."},
{d:2,q:"¿Cuál es el mecanismo #1 que usa el LLM para elegir herramientas?",a:"La descripción de la herramienta. Ante misrouting, el primer paso es expandir descripciones (formatos de entrada, ejemplos, casos borde, límites vs tools similares)."},
{d:2,q:"Cuatro categorías de error en respuestas MCP estructuradas",a:"transient (timeout, servicio caído), validation (input inválido), business (violación de política), permission. Más isRetryable boolean y mensaje legible."},
{d:2,q:"Fallo de acceso vs resultado vacío válido",a:"Timeout/error de acceso → requiere decisión de retry. Query exitosa sin matches → éxito con 0 resultados. Nunca confundirlos ni reportarlos igual."},
{d:2,q:"¿Qué pasa si le das 18 herramientas a un agente?",a:"Degrada la fiabilidad de selección. Solución: acceso scoped por rol (4-5 tools relevantes), con tools cross-rol acotadas solo para necesidades de alta frecuencia."},
{d:2,q:"tool_choice: auto vs any vs forzada",a:"auto: puede responder texto sin llamar tools. any: DEBE llamar alguna tool (elige cuál). Forzada {type:\"tool\",name:...}: DEBE llamar esa tool específica."},
{d:2,q:".mcp.json vs ~/.claude.json",a:".mcp.json = scope proyecto, compartido por git con el equipo (con ${VAR} para credenciales). ~/.claude.json = scope usuario, personal/experimental. Ambos disponibles simultáneamente."},
{d:2,q:"¿Para qué sirven los MCP resources?",a:"Exponer catálogos de contenido (schemas de BD, jerarquías de docs, resúmenes de issues) para que el agente vea qué hay disponible SIN tool calls exploratorios."},
{d:2,q:"Grep vs Glob",a:"Grep = buscar CONTENIDO dentro de archivos (funciones, errores, imports). Glob = buscar ARCHIVOS por patrón de nombre/ruta (**/*.test.tsx)."},
{d:2,q:"Edit falla porque el texto ancla no es único. ¿Fallback?",a:"Read (cargar archivo completo) + Write (reescribirlo). "},
{d:2,q:"El agente usa Grep en vez de tu MCP tool más capaz. ¿Fix?",a:"Mejorar la descripción de la MCP tool: explicar capacidades y outputs en detalle para que el agente la prefiera."},
{d:3,q:"Jerarquía de CLAUDE.md (3 niveles)",a:"Usuario (~/.claude/CLAUDE.md — personal, NO va por git), Proyecto (raíz o .claude/ — compartido con el equipo), Directorio (subdirectorios)."},
{d:3,q:"Un compañero nuevo no recibe las instrucciones del equipo. ¿Diagnóstico típico?",a:"Estaban en el CLAUDE.md de NIVEL USUARIO del autor. Deben moverse a nivel proyecto para compartirse por git. Verificar con /memory."},
{d:3,q:"¿Dónde va un slash command compartido con el equipo? ¿Y uno personal?",a:"Equipo: .claude/commands/ (versionado en git). Personal: ~/.claude/commands/."},
{d:3,q:"Tres opciones de frontmatter de SKILL.md y su función",a:"context: fork (corre en contexto aislado, no contamina la conversación), allowed-tools (restringe herramientas), argument-hint (pide parámetros si se invoca sin argumentos)."},
{d:3,q:"¿Skills o CLAUDE.md?",a:"Skills: workflows específicos, invocación bajo demanda. CLAUDE.md: estándares universales, siempre cargados."},
{d:3,q:"Convenciones para tests dispersos por todo el codebase, ¿mecanismo?",a:".claude/rules/ con frontmatter YAML paths: [\"**/*.test.tsx\"] — carga solo al editar archivos que matchean, sin importar el directorio."},
{d:3,q:"¿Cuándo plan mode y cuándo ejecución directa?",a:"Plan mode: gran escala, múltiples enfoques válidos, decisiones arquitectónicas, multi-archivo. Directa: cambios simples y bien delimitados (bug de un archivo con stack trace claro)."},
{d:3,q:"¿Qué hace el Explore subagent?",a:"Aísla el output verboso de descubrimiento y devuelve resúmenes → preserva el contexto de la conversación principal."},
{d:3,q:"Técnica más efectiva cuando la prosa produce transformaciones inconsistentes",a:"2-3 ejemplos input/output concretos."},
{d:3,q:"¿Qué es el interview pattern?",a:"Hacer que Claude te pregunte antes de implementar, para descubrir consideraciones no anticipadas (invalidación de caché, modos de fallo) en dominios desconocidos."},
{d:3,q:"¿Varios issues: un mensaje o secuencial?",a:"Si los fixes INTERACTÚAN entre sí → un solo mensaje detallado. Si son independientes → secuencial."},
{d:3,q:"El job de CI con Claude Code cuelga esperando input. ¿Fix?",a:"Flag -p (--print): modo no interactivo. CLAUDE_HEADLESS y --batch NO existen (distractores)."},
{d:3,q:"Output estructurado parseable en CI, ¿flags?",a:"--output-format json + --json-schema."},
{d:4,q:"¿Por qué falla \"sé conservador\" y qué funciona?",a:"Las instrucciones vagas no mejoran precisión. Funcionan criterios categóricos específicos: qué reportar (bugs, seguridad) y qué omitir (estilo menor), con ejemplos concretos por nivel de severidad."},
{d:4,q:"Una categoría de review genera muchos falsos positivos y los devs pierden confianza. ¿Táctica?",a:"Desactivarla temporalmente mientras se mejora el prompt de esa categoría — los FP contaminan la confianza en las categorías precisas."},
{d:4,q:"¿Cuántos ejemplos few-shot y qué deben mostrar?",a:"2-4 dirigidos a casos ambiguos, mostrando el RAZONAMIENTO de por qué una acción sobre alternativas plausibles. Permiten generalizar a patrones nuevos."},
{d:4,q:"¿Qué garantiza tool_use + JSON schema y qué NO?",a:"Elimina errores de SINTAXIS JSON. NO previene errores SEMÁNTICOS (items que no suman el total, valores en campos equivocados)."},
{d:4,q:"El modelo fabrica valores para campos que el documento no tiene. ¿Fix de schema?",a:"Hacer los campos opcionales/nullable. También: enum con \"unclear\" para ambiguos y \"other\" + campo detalle para categorías extensibles."},
{d:4,q:"¿Cuándo es inútil el retry-with-error-feedback?",a:"Cuando la información NO está en el documento fuente. Sí funciona para errores de formato/estructura."},
{d:4,q:"Message Batches API: 4 datos clave",a:"50% de descuento, ventana de hasta 24h, SIN SLA de latencia, SIN tool calling multi-turno. custom_id correlaciona request/response y permite reenviar solo fallidos."},
{d:4,q:"¿Batch API para checks pre-merge?",a:"NUNCA — es bloqueante y batch no tiene SLA de latencia. Batch solo para workloads tolerantes: reportes nocturnos, auditorías semanales."},
{d:4,q:"¿Por qué el auto-review falla y cuál es la alternativa?",a:"El modelo retiene el contexto de razonamiento de la generación y no cuestiona sus decisiones. Alternativa: segunda instancia INDEPENDIENTE sin ese contexto."},
{d:4,q:"Review de 14 archivos: feedback inconsistente y contradictorio. ¿Fix?",a:"Multi-pass: análisis local por archivo + pasada separada de integración cross-file. Más contexto NO arregla la dilución de atención."},
{d:5,q:"El agente olvida montos y fechas en conversaciones largas. ¿Patrón?",a:"Bloque persistente de \"case facts\" (montos, fechas, IDs, estados) incluido en cada prompt, FUERA del historial resumido."},
{d:5,q:"¿Qué es lost in the middle y cómo se mitiga?",a:"El modelo procesa bien inicio y final de inputs largos pero omite el medio. Mitigación: resumen de hallazgos clave al INICIO + headers de sección explícitos."},
{d:5,q:"Tool outputs de 40 campos cuando importan 5. ¿Qué hacer?",a:"Recortarlos a los campos relevantes ANTES de que se acumulen en el contexto."},
{d:5,q:"Tres triggers CORRECTOS de escalación",a:"1) Cliente pide humano explícitamente (honrar YA, sin investigar antes). 2) Gap/excepción de política. 3) Incapacidad de progresar. NO confiables: sentimiento, confianza auto-reportada."},
{d:5,q:"lookup devuelve múltiples clientes que coinciden. ¿Qué hace el agente?",a:"Pedir identificadores adicionales para desambiguar. NUNCA elegir por heurística."},
{d:5,q:"¿Qué incluye una buena propagación de error de subagente?",a:"Tipo de fallo, qué se intentó, resultados parciales y alternativas posibles → el coordinador decide. Anti-patrones: status genérico, vacío como éxito, matar el workflow."},
{d:5,q:"Herramientas contra la degradación de contexto en exploración larga",a:"Scratchpad files (persistir hallazgos), delegar lo verboso a subagentes, resumir antes de cada fase, /compact, manifests para crash recovery."},
{d:5,q:"97% de accuracy global. ¿Reducimos el review humano?",a:"No todavía: el agregado puede ocultar mal desempeño por tipo de documento o campo. Segmentar accuracy + muestreo estratificado de alta confianza + confianza por campo calibrada con sets etiquetados."},
{d:5,q:"Dos fuentes creíbles con estadísticas distintas. ¿Qué hace la síntesis?",a:"Anotar el conflicto con atribución de fuente (y fechas de publicación — puede ser diferencia temporal). NUNCA elegir arbitrariamente."},
{d:5,q:"¿Cómo se preserva la atribución de fuentes en síntesis multi-agente?",a:"Los subagentes emiten mapeos claim-source estructurados (URL, documento, excerpt, fecha) que la síntesis debe preservar y fusionar."}

/* d: dominio, q: pregunta, o: opciones, a: índices correctos, m: multi-respuesta, e: explicación */
const QUESTIONS = [
/* ---------- DOMINIO 1 (16) ---------- */
{d:1,q:"En producción, tu agente de soporte salta get_customer en el 12% de los casos y llama lookup_order solo con el nombre declarado por el cliente, causando refunds a cuentas equivocadas. ¿Qué cambio resuelve el problema con mayor efectividad?",o:["Añadir un prerequisito programático que bloquee lookup_order y process_refund hasta que get_customer devuelva un ID de cliente verificado","Reforzar el system prompt indicando que la verificación con get_customer es obligatoria antes de cualquier operación","Añadir few-shot examples mostrando al agente llamando siempre get_customer primero","Implementar un clasificador de routing que habilite solo las tools apropiadas para cada tipo de request"],a:[0],m:false,e:"Cuando una secuencia de tools es crítica (identidad antes de dinero), el enforcement programático da garantía determinística. Prompt y few-shot son probabilísticos — insuficientes con consecuencias financieras. El routing aborda disponibilidad, no orden."},
{d:1,q:"Estás implementando el loop de un agente con el Agent SDK. ¿Cómo decide tu código si continúa o termina?",o:["Inspecciona stop_reason: continúa si es \"tool_use\", termina si es \"end_turn\"","Cuenta iteraciones y termina al llegar a un máximo configurado","Busca frases como \"he terminado\" en el texto de la respuesta","Termina cuando la respuesta contiene texto además de tool calls"],a:[0],m:false,e:"El control de flujo correcto se basa en stop_reason. Iteración máxima es solo red de seguridad; parsear lenguaje natural o presencia de texto son anti-patrones explícitos del examen."},
{d:1,q:"Claude responde con stop_reason \"tool_use\" pidiendo lookup_order. ¿Cuál es la secuencia correcta?",o:["Ejecutar la tool, añadir el resultado como tool_result al historial de conversación y reenviar el request","Ejecutar la tool y mostrar el resultado directamente al usuario","Ejecutar la tool y empezar una conversación nueva con el resultado como system prompt","Pedir a Claude confirmación de que realmente necesita esa tool antes de ejecutarla"],a:[0],m:false,e:"El loop agéntico requiere devolver el tool_result al historial para que el modelo incorpore la información y decida el siguiente paso."},
{d:1,q:"Tu agente a veces entra en bucles largos. Un compañero propone «limitar a 5 iteraciones y devolver lo que haya». ¿Cuál es la evaluación correcta?",o:["Válido como red de seguridad contra loops infinitos, pero nunca como mecanismo principal de parada — este debe ser stop_reason","Correcto: los límites de iteración son el mecanismo estándar de terminación","Incorrecto: los agentes nunca deben tener límites de iteración","Mejor alternativa: analizar el sentimiento de la respuesta para detectar si el agente está atascado"],a:[0],m:false,e:"El límite de iteraciones protege contra fallos, pero la lógica principal de parada es la condición real (stop_reason / criterios de calidad cumplidos). Sentimiento es un distractor clásico."},
{d:1,q:"Tu coordinador no logra lanzar subagentes: los Task calls fallan. ¿Causa más probable?",o:["El allowedTools del coordinador no incluye \"Task\"","Los subagentes no tienen system prompt definido","El coordinador debe lanzar subagentes en turnos separados","Falta configurar memoria compartida entre coordinador y subagentes"],a:[0],m:false,e:"La herramienta Task es el mecanismo de spawning y debe estar en allowedTools del coordinador. La memoria compartida no existe (los subagentes tienen contexto aislado)."},
{d:1,q:"El subagente de síntesis produce reportes que ignoran los hallazgos de los subagentes de búsqueda y análisis. ¿Causa más probable?",o:["Los hallazgos no se están incluyendo explícitamente en el prompt del subagente de síntesis — no hay herencia automática de contexto","El subagente de síntesis necesita acceso a las tools de búsqueda web","Los subagentes comparten memoria pero la síntesis corre antes de que se escriba","El coordinador debe usar fork_session para que la síntesis vea el contexto"],a:[0],m:false,e:"Los subagentes operan con contexto aislado: todo lo que necesitan debe pasarse explícitamente en su prompt, idealmente en formato estructurado con metadata de atribución."},
{d:1,q:"Quieres que los subagentes de búsqueda web y análisis de documentos corran EN PARALELO. ¿Cómo se implementa?",o:["El coordinador emite ambos Task tool calls en una sola respuesta","El coordinador emite un Task call por turno, alternando entre ambos","Se configuran los subagentes con parallel: true en su AgentDefinition","Se crean dos sesiones separadas con fork_session y se ejecutan a la vez"],a:[0],m:false,e:"El paralelismo de subagentes se logra emitiendo múltiples Task calls en una única respuesta del coordinador. fork_session es para explorar enfoques divergentes, no para paralelizar subtareas."},
{d:1,q:"Tu sistema investigó «impacto de la IA en industrias creativas». Cada subagente completó su tarea correctamente, pero el reporte solo cubre artes visuales y omite música, escritura y cine. Los logs muestran que el coordinador creó subtareas de arte digital, diseño gráfico y fotografía. ¿Causa raíz?",o:["La descomposición del coordinador fue demasiado estrecha: las asignaciones no cubren todos los dominios del tema","El agente de síntesis no tiene instrucciones para detectar gaps de cobertura","Las queries del agente de búsqueda no son suficientemente amplias","El agente de análisis filtra fuentes no visuales por criterios de relevancia restrictivos"],a:[0],m:false,e:"Los logs revelan la causa directamente: la descomposición omitió dominios completos. Los subagentes ejecutaron bien lo asignado — culpar a los downstream es el distractor."},
{d:1,q:"¿Por qué se enruta toda la comunicación entre subagentes a través del coordinador (hub-and-spoke)? (Elige 2)",o:["Observabilidad del flujo de información","Manejo de errores consistente y controlado","Menor latencia total del sistema","Los subagentes no pueden emitir tool calls por sí mismos"],a:[0,1],m:true,e:"Hub-and-spoke da observabilidad, manejo de errores consistente y flujo de información controlado. No reduce latencia (puede aumentarla) y los subagentes sí usan sus propias tools."},
{d:1,q:"Política: ningún refund mayor a $500 puede procesarse sin humano — cumplimiento obligatorio por auditoría. ¿Implementación correcta?",o:["Hook que intercepta las llamadas a process_refund, bloquea montos > $500 y redirige a escalación humana","Instrucción destacada en el system prompt: «nunca proceses refunds mayores a $500»","Few-shot examples mostrando refunds grandes siendo escalados","Post-procesamiento que revierte los refunds grandes ya procesados"],a:[0],m:false,e:"«Cumplimiento obligatorio» → enforcement programático. El prompt es probabilístico; revertir después ya incumplió la política."},
{d:1,q:"Tres MCP tools devuelven fechas en formatos distintos (Unix, ISO 8601, texto) y el agente comete errores al compararlas. ¿Solución más confiable?",o:["Hook PostToolUse que normaliza los resultados a un formato único antes de que el modelo los procese","Instruir en el system prompt que tenga cuidado con los formatos de fecha","Few-shot examples de conversión correcta de fechas","Pedir a los proveedores de los MCP servers que cambien sus formatos"],a:[0],m:false,e:"PostToolUse intercepta resultados y los transforma determinísticamente — exactamente su caso de uso. Las opciones de prompt son probabilísticas."},
{d:1,q:"Debes automatizar el review de PRs que tocan muchos aspectos conocidos (estilo, seguridad, tests, docs). ¿Patrón de descomposición?",o:["Prompt chaining: pasos secuenciales fijos — análisis por archivo y luego una pasada de integración cross-file","Descomposición dinámica: que el agente decida qué revisar según lo que encuentre","Un solo prompt gigante cubriendo todos los aspectos a la vez","Ejecutar 5 reviews independientes completos y quedarse con la intersección"],a:[0],m:false,e:"Workflow predecible multi-aspecto → prompt chaining con pasos enfocados. La descomposición dinámica es para investigación abierta."},
{d:1,q:"«Añadir tests comprehensivos a un codebase legacy desconocido». ¿Enfoque de descomposición?",o:["Adaptativo: mapear la estructura, identificar áreas de alto impacto y crear un plan priorizado que se ajusta según lo descubierto","Pipeline fijo: generar tests archivo por archivo en orden alfabético","Generar todos los tests en una sola pasada con el codebase completo en contexto","Pedir al agente que estime cuántos tests se necesitan y dividir el trabajo en partes iguales"],a:[0],m:false,e:"Tarea abierta y exploratoria → descomposición dinámica que se adapta a dependencias descubiertas. El pipeline fijo es para workflows predecibles."},
{d:1,q:"El agente escala un caso a un humano que NO tiene acceso a la transcripción. ¿Qué debe incluir el handoff?",o:["Resumen estructurado: ID del cliente, causa raíz, monto del refund y acción recomendada","Un enlace a la sesión para que el humano relea la conversación completa","Solo el último mensaje del cliente para no sesgar al humano","El historial completo de tool calls en formato JSON crudo"],a:[0],m:false,e:"El handoff estructurado transfiere lo esencial para actuar. El humano no tiene acceso a la transcripción, y el JSON crudo no es accionable."},
{d:1,q:"Analizaste un codebase la semana pasada en una sesión nombrada. Hoy el código cambió sustancialmente. ¿Cómo continúas?",o:["Sesión nueva inyectando un resumen estructurado del análisis previo — los tool results viejos están obsoletos","--resume de la sesión anterior sin más: el contexto previo acelera el trabajo","--resume y confiar en que el agente detectará los cambios automáticamente","Repetir el análisis completo desde cero sin aprovechar nada del anterior"],a:[0],m:false,e:"Con tool results obsoletos, resumir la sesión vieja arrastra información falsa. Sesión nueva + resumen estructurado es lo confiable. (Si los cambios fueran menores: --resume informando qué archivos cambiaron.)"},
{d:1,q:"Quieres comparar dos estrategias de refactoring partiendo del mismo análisis del codebase, sin que se contaminen entre sí. ¿Mecanismo?",o:["fork_session: dos ramas independientes desde la base de análisis compartida","--resume de la misma sesión dos veces seguidas","Dos agentes en paralelo repitiendo el análisis completo cada uno","Un solo agente evaluando ambas estrategias en la misma conversación"],a:[0],m:false,e:"fork_session existe exactamente para explorar enfoques divergentes desde una base común. Evaluar ambas en la misma conversación contamina; repetir el análisis duplica costo."},
/* ---------- DOMINIO 2 (11) ---------- */
{d:2,q:"El agente confunde get_customer con lookup_order. Ambas tienen descripciones mínimas («Retrieves customer information» / «Retrieves order details») y aceptan identificadores similares. ¿Primer paso más efectivo?",o:["Expandir las descripciones: formatos de entrada, queries de ejemplo, casos borde y límites que expliquen cuándo usar cada una","Añadir 5-8 few-shot examples de selección correcta al system prompt","Implementar un routing layer que pre-seleccione la tool según keywords","Consolidar ambas en una sola tool lookup_entity"],a:[0],m:false,e:"Las descripciones son el mecanismo principal de selección — mejorar la descripción ataca la causa raíz con bajo esfuerzo. Few-shot añade overhead sin arreglar la raíz; routing es sobre-ingeniería; consolidar excede un «primer paso»."},
{d:2,q:"Tienes analyze_content y analyze_document con descripciones casi idénticas y el agente las confunde. ¿Remedio recomendado?",o:["Renombrarlas según su propósito real (p. ej. extract_web_results) y reescribir descripciones que las diferencien con límites claros","Eliminar una de las dos aunque tengan backends distintos","Añadir un número de prioridad para que el agente prefiera una","Interceptar cada llamada y redirigirla a la tool correcta con código"],a:[0],m:false,e:"El overlap funcional se elimina con nombres y descripciones diferenciadas (qué hace, con qué inputs, cuándo usarla vs la otra)."},
{d:2,q:"Tu MCP tool devuelve «Operation failed» para todos los errores. ¿Qué debería devolver en su lugar?",o:["Metadata estructurada: errorCategory (transient/validation/business/permission), isRetryable y descripción legible","Un código HTTP y nada más, para ahorrar tokens","El stack trace completo del servidor para máxima transparencia","Un resultado vacío marcado como éxito para no interrumpir el flujo"],a:[0],m:false,e:"Los errores estructurados permiten al agente decidir: reintentar transitorios, explicar errores de negocio, no desperdiciar retries. Vacío-como-éxito suprime el error (anti-patrón)."},
{d:2,q:"Un cliente pide un refund que viola la política de 30 días. ¿Respuesta ideal de la tool process_refund?",o:["{isError: true, errorCategory: \"business\", isRetryable: false, message: \"Excede la ventana de 30 días\"} — para que el agente explique al cliente sin reintentar","{isError: true, message: \"Error\"} — el agente decidirá qué hacer","Lanzar una excepción no controlada para abortar el workflow","Procesar el refund y registrar la violación para auditoría posterior"],a:[0],m:false,e:"Error de negocio: no reintentable, con explicación amigable para que el agente comunique. Genérico impide decisiones; procesar viola la política."},
{d:2,q:"Una búsqueda no devuelve resultados. ¿Cómo debe distinguirse de un fallo del servicio?",o:["Vacío válido = éxito con 0 matches; timeout/fallo de acceso = error que requiere decisión de retry — deben reportarse de forma distinta","Ambos como error, para que el agente siempre reintente","Ambos como éxito, para no interrumpir el flujo","Devolver null en ambos casos y que el agente pregunte al usuario"],a:[0],m:false,e:"Confundirlos causa retries inútiles (sobre vacíos válidos) o pérdida de datos (fallos tratados como vacíos)."},
{d:2,q:"Tu agente tiene acceso a 18 herramientas y su selección se volvió errática. ¿Solución principal?",o:["Acceso scoped: restringir cada agente a las 4-5 tools de su rol, con tools cross-rol acotadas solo para necesidades de alta frecuencia","Ordenar las 18 tools alfabéticamente en la definición","Duplicar las descripciones de todas las tools","Usar tool_choice: \"any\" para forzar que siempre use alguna"],a:[0],m:false,e:"Muchas tools = mayor complejidad de decisión = selección degradada. El principio es scoped access por especialización."},
{d:2,q:"El agente de síntesis necesita verificar hechos constantemente. El 85% son fact-checks simples; el 15% requiere investigación profunda. Cada verificación hoy cuesta 2-3 round-trips vía coordinador (+40% latencia). ¿Solución?",o:["Darle una tool acotada verify_fact para el 85% simple; el 15% complejo sigue vía coordinador","Darle acceso a todas las tools de búsqueda web para que verifique todo directamente","Acumular todas las verificaciones y enviarlas en batch al final de la síntesis","Cachear proactivamente contexto extra durante la investigación inicial anticipando verificaciones"],a:[0],m:false,e:"Mínimo privilegio: tool acotada para el caso frecuente, coordinación para el complejo. Todas las tools viola separación de concerns; batch crea dependencias bloqueantes; el caché especulativo no puede predecir."},
{d:2,q:"Extraes datos de documentos de tipo desconocido con múltiples schemas de extracción disponibles. Debes garantizar que el modelo llame alguna tool y no responda texto libre. ¿Configuración?",o:["tool_choice: \"any\"","tool_choice: \"auto\"","tool_choice forzada a la primera tool de la lista","max_tokens bajo para desincentivar respuestas de texto"],a:[0],m:false,e:"\"any\" obliga a llamar alguna tool dejando que el modelo elija el schema correcto. \"auto\" permite texto; forzar una específica es incorrecto si el tipo es desconocido."},
{d:2,q:"Tu equipo comparte un MCP server de GitHub que requiere token. ¿Configuración correcta?",o:[".mcp.json (scope proyecto, versionado en git) con expansión de variable ${GITHUB_TOKEN}","~/.claude.json de cada desarrollador, con el token hardcodeado","El token en texto plano dentro de .mcp.json commiteado","Un CLAUDE.md con instrucciones de cómo instalar el server manualmente"],a:[0],m:false,e:".mcp.json comparte la configuración vía git; ${VAR} evita commitear secretos — cada dev define su token en su entorno."},
{d:2,q:"Los agentes hacen decenas de tool calls exploratorios para descubrir qué documentos existen en tu sistema. ¿Mecanismo MCP que lo evita?",o:["Exponer un catálogo de contenido como MCP resources","Crear una tool list_everything que devuelva todo el contenido","Aumentar el límite de tool calls por turno","Precargar todos los documentos en el system prompt"],a:[0],m:false,e:"Los MCP resources exponen catálogos (jerarquías de docs, schemas, resúmenes) dándole visibilidad al agente sin tool calls exploratorios ni contexto desperdiciado."},
{d:2,q:"Necesitas: (1) encontrar todos los archivos **/*.test.tsx, (2) encontrar todos los llamadores de la función processOrder, (3) modificar una línea puntual en un archivo. ¿Herramientas correctas en orden?",o:["Glob, Grep, Edit","Grep, Glob, Write","Glob, Read, Write","Grep, Grep, Edit"],a:[0],m:false,e:"Glob = patrones de nombre/ruta; Grep = contenido (llamadores de una función); Edit = modificación puntual con ancla única (fallback Read+Write si el ancla no es única)."},
/* ---------- DOMINIO 3 (12) ---------- */
{d:3,q:"Quieres un slash command /review con el checklist del equipo, disponible para todos al clonar el repo. ¿Dónde va?",o:["En .claude/commands/ dentro del repositorio","En ~/.claude/commands/ de cada desarrollador","En el CLAUDE.md de la raíz del proyecto","En .claude/config.json con un array de commands"],a:[0],m:false,e:".claude/commands/ se versiona en git y queda disponible al clonar. ~/.claude/commands/ es personal; CLAUDE.md es para instrucciones, no commands; config.json con array de commands NO existe."},
{d:3,q:"Un desarrollador nuevo clona el repo pero Claude Code no aplica los estándares del equipo, que sí funcionan en la máquina del tech lead. ¿Diagnóstico más probable?",o:["Los estándares están en el CLAUDE.md de nivel usuario (~/.claude/) del tech lead — deben moverse a nivel proyecto","El desarrollador nuevo necesita ejecutar /compact para cargar la memoria","Los CLAUDE.md solo se cargan en sesiones con --resume","Falta un archivo .claude/config.json que active la memoria compartida"],a:[0],m:false,e:"El nivel usuario no viaja por git. Los estándares de equipo van a nivel proyecto. Verificable con /memory."},
{d:3,q:"Tu CLAUDE.md creció a 800 líneas mezclando testing, convenciones de API y deployment; el equipo reporta comportamiento inconsistente. ¿Reorganización recomendada?",o:["Dividirlo en archivos por tema en .claude/rules/ (testing.md, api-conventions.md, deployment.md)","Convertirlo todo en un solo skill invocable","Duplicarlo en cada subdirectorio del proyecto","Moverlo a ~/.claude/CLAUDE.md de cada desarrollador"],a:[0],m:false,e:".claude/rules/ permite organización modular por tema en lugar de un monolito. @import es otra vía de modularidad."},
{d:3,q:"Los archivos de test (Button.test.tsx) están dispersos junto al código en todo el codebase y deben seguir las mismas convenciones sin importar el directorio. ¿Mecanismo más mantenible?",o:["Archivos en .claude/rules/ con frontmatter YAML paths: [\"**/*.test.tsx\"]","Todas las convenciones en el CLAUDE.md raíz bajo headers, confiando en que Claude infiera cuál aplica","Skills en .claude/skills/ para cada tipo de código","Un CLAUDE.md en cada subdirectorio con las convenciones de esa área"],a:[0],m:false,e:"Los glob patterns aplican por tipo de archivo sin importar ubicación — clave para archivos dispersos. Inferencia es poco confiable; skills requieren invocación; CLAUDE.md es directorio-bound."},
{d:3,q:"Debes reestructurar un monolito en microservicios: docenas de archivos, decisiones de fronteras de servicio y dependencias. ¿Enfoque?",o:["Plan mode: explorar el codebase, entender dependencias y diseñar antes de cambiar nada","Ejecución directa incremental: la implementación revelará las fronteras naturales","Ejecución directa con instrucciones upfront exhaustivas de cómo estructurar cada servicio","Empezar en directa y cambiar a plan mode solo si surge complejidad inesperada"],a:[0],m:false,e:"Gran escala + múltiples enfoques + decisiones arquitectónicas = plan mode, siempre. La complejidad ya está declarada — no es algo que «podría emerger»."},
{d:3,q:"Bug de un solo archivo con stack trace claro que apunta a la línea exacta. ¿Enfoque?",o:["Ejecución directa: cambio simple y bien delimitado","Plan mode: siempre es más seguro planear primero","Lanzar un subagente Explore para investigar todo el módulo","Pedir un análisis completo de la arquitectura antes de tocar nada"],a:[0],m:false,e:"Plan mode en tareas triviales añade fricción sin valor. Directa para cambios claros y delimitados."},
{d:3,q:"Durante una tarea multi-fase, la exploración del codebase llena el contexto principal con output verboso. ¿Mecanismo de Claude Code diseñado para esto?",o:["El Explore subagent: aísla el descubrimiento verboso y devuelve resúmenes","Aumentar max_tokens de la sesión","Guardar la conversación y abrir una nueva cada 10 minutos","Desactivar las tools de lectura durante la exploración"],a:[0],m:false,e:"El Explore subagent existe para aislar la fase de descubrimiento y preservar el contexto de la conversación principal."},
{d:3,q:"Le describes en prosa una transformación de datos y Claude la implementa diferente cada vez. ¿Técnica más efectiva?",o:["Dar 2-3 ejemplos concretos de input/output","Reescribir la descripción con más detalle y longitud","Repetir la instrucción al principio y al final del prompt","Subir la temperatura para que explore más opciones"],a:[0],m:false,e:"Los ejemplos input/output concretos son la forma más efectiva de comunicar transformaciones cuando la prosa se interpreta de forma inconsistente."},
{d:3,q:"Vas a implementar caching en un dominio que no conoces bien. ¿Qué patrón de refinamiento iterativo ayuda a descubrir consideraciones no anticipadas ANTES de implementar?",o:["El interview pattern: pedir a Claude que te haga preguntas (invalidación, modos de fallo) antes de implementar","Test-driven: escribir tests después de la implementación","Pedir tres implementaciones alternativas y elegir la mejor","Implementar rápido y refinar según los bugs que aparezcan"],a:[0],m:false,e:"El interview pattern hace emerger consideraciones que no habías anticipado (estrategia de invalidación, fallos) antes de escribir código."},
{d:3,q:"El código generado tiene 4 problemas: dos interactúan entre sí (el fix de uno afecta al otro) y dos son independientes. ¿Estrategia de feedback?",o:["Los que interactúan: juntos en un solo mensaje detallado; los independientes pueden ir secuencialmente","Los cuatro de uno en uno, siempre","Los cuatro juntos siempre, para ahorrar mensajes","Reescribir el prompt original desde cero"],a:[0],m:false,e:"Issues que interactúan se resuelven juntos (el modelo necesita verlos a la vez); los independientes pueden iterarse secuencialmente."},
{d:3,q:"Tu pipeline ejecuta claude \"Analiza este PR\" y el job cuelga indefinidamente esperando input interactivo. ¿Fix correcto?",o:["Añadir el flag -p: claude -p \"Analiza este PR\"","Definir la variable de entorno CLAUDE_HEADLESS=true","Redirigir stdin desde /dev/null","Añadir el flag --batch"],a:[0],m:false,e:"-p (--print) es el modo no interactivo documentado: procesa, imprime a stdout y sale. CLAUDE_HEADLESS y --batch no existen (distractores de features inventadas)."},
{d:3,q:"Tu CI debe publicar los hallazgos del review como comentarios inline estructurados en el PR. ¿Flags correctos?",o:["--output-format json junto con --json-schema","--verbose para capturar todo el output","--print-json (modo estructurado)","Parsear el texto libre del output con expresiones regulares"],a:[0],m:false,e:"--output-format json + --json-schema producen output estructurado parseable conforme a tu schema. --print-json no existe; regex sobre texto libre es frágil."},
