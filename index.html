{d:4,q:"Tu reviewer automático genera demasiados falsos positivos. Un compañero propone añadir «sé conservador y reporta solo hallazgos de alta confianza». ¿Evaluación correcta?",o:["Insuficiente: las instrucciones vagas no mejoran precisión — se necesitan criterios categóricos específicos de qué reportar y qué omitir","Correcto: es la forma estándar de reducir falsos positivos","Mejor aún: pedir un score de confianza y filtrar por debajo de 7","Mejor aún: analizar el sentimiento del código para detectar problemas reales"],a:[0],m:false,e:"«Sé conservador» y la confianza auto-reportada no funcionan (distractores clásicos). Funcionan criterios explícitos: reportar bugs y seguridad, omitir estilo menor, con ejemplos por categoría."},
{d:4,q:"La categoría «seguridad» de tu reviewer es precisa, pero la de «rendimiento» genera 80% de falsos positivos y los devs están ignorando TODO el review. ¿Acción correcta?",o:["Desactivar temporalmente la categoría de rendimiento mientras mejoras sus criterios, para restaurar la confianza","Mantener todo activo: más hallazgos siempre es mejor","Bajar el umbral de confianza global del reviewer","Pedir a los devs que ignoren solo la categoría mala"],a:[0],m:false,e:"Los falsos positivos de una categoría contaminan la confianza en las categorías precisas. Desactivar temporalmente + mejorar es la táctica del examen."},
{d:4,q:"Las clasificaciones de severidad de tu reviewer son inconsistentes: el mismo tipo de bug a veces es «critical» y a veces «minor». ¿Fix más efectivo?",o:["Definir criterios explícitos de severidad con ejemplos de código concretos para cada nivel","Añadir «clasifica la severidad cuidadosamente» al prompt","Promediar la severidad de tres ejecuciones independientes","Eliminar el campo de severidad del output"],a:[0],m:false,e:"Consistencia de clasificación = criterios explícitos + ejemplos concretos por nivel. Las instrucciones vagas no calibran."},
{d:4,q:"Tu agente resuelve solo el 55% en primer contacto (meta: 80%): escala casos simples e intenta resolver casos complejos que requieren excepciones de política. ¿Mejora más efectiva?",o:["Criterios explícitos de escalación en el system prompt con few-shot examples de cuándo escalar vs resolver","Score de confianza auto-reportado (1-10) con umbral de escalación automática","Un clasificador ML entrenado con tickets históricos que pre-decida la escalación","Análisis de sentimiento que escale cuando la frustración supere un umbral"],a:[0],m:false,e:"El problema es de límites de decisión difusos → criterios + few-shot. Confianza auto-reportada está mal calibrada; el clasificador es sobre-ingeniería antes de optimizar el prompt; el sentimiento no correlaciona con complejidad."},
{d:4,q:"Con instrucciones detalladas, el output del reviewer sigue teniendo formato inconsistente. ¿Técnica más efectiva para lograr formato consistente y accionable?",o:["Few-shot examples que demuestren el formato exacto deseado (ubicación, issue, severidad, fix sugerido)","Repetir las instrucciones de formato tres veces en el prompt","Bajar la temperatura a 0","Pedir el output en mayúsculas para las secciones"],a:[0],m:false,e:"Cuando las instrucciones detalladas no bastan, los few-shot examples que demuestran el formato son la técnica más efectiva de consistencia."},
{d:4,q:"Tu extracción de facturas devuelve JSON con errores de sintaxis intermitentes que rompen el parser. ¿Solución más confiable?",o:["Definir una tool de extracción con JSON schema y extraer del tool_use — elimina los errores de sintaxis","Pedir «responde SOLO con JSON válido» en el prompt","Reintentar hasta que el JSON parsee","Post-procesar el texto con una librería de reparación de JSON"],a:[0],m:false,e:"Tool use con schema es la forma más confiable de output estructurado: garantiza sintaxis válida (aunque no semántica)."},
{d:4,q:"Usas tool_use con schema estricto y aún así hay facturas donde los line items no suman el stated_total. ¿Por qué y qué haces?",o:["El schema elimina errores de sintaxis, no semánticos — añadir validación (p. ej. extraer calculated_total y flaggear discrepancias)","Es un bug del schema: endurecer los tipos lo resuelve","Subir max_tokens para que el modelo tenga espacio de calcular","Cambiar a un modelo más grande"],a:[0],m:false,e:"Errores semánticos (sumas, campos equivocados) sobreviven al schema. Se atacan con validación semántica y self-check (calculated vs stated, conflict_detected)."},
{d:4,q:"El modelo rellena el campo «fecha_de_firma» con fechas inventadas cuando el documento no la contiene. ¿Fix de diseño de schema?",o:["Hacer el campo nullable/opcional para que el modelo pueda devolver null en lugar de fabricar","Añadir «no inventes fechas» al prompt","Hacer el campo required con formato estricto de fecha","Eliminar el campo del schema"],a:[0],m:false,e:"Los campos required presionan al modelo a fabricar valores. Nullable permite representar la ausencia — el fix estructural, no el prompt."},
{d:4,q:"Tu validación Pydantic falla en una extracción. ¿Diseño correcto del retry?",o:["Reenviar el documento original + la extracción fallida + los errores específicos de validación para que el modelo se corrija","Reenviar el mismo prompt tal cual, esperando un resultado distinto","Cambiar de schema en cada retry hasta que uno pase","Reintentar solo si el error es que la información no existe en el documento"],a:[0],m:false,e:"Retry-with-error-feedback: el modelo necesita saber QUÉ falló. Nota: si la información no está en el documento, el retry es inútil — es el caso donde NO reintentar."},
{d:4,q:"Dos workflows usan la API en tiempo real: (1) check bloqueante pre-merge y (2) reporte de deuda técnica generado de noche. Tu manager propone pasar ambos a la Batch API por el 50% de ahorro. ¿Evaluación?",o:["Batch solo para el reporte nocturno; el pre-merge sigue síncrono","Ambos a batch con polling de estado","Ambos síncronos para evitar problemas de orden en los resultados","Ambos a batch con fallback a tiempo real si tardan mucho"],a:[0],m:false,e:"Batch = hasta 24h sin SLA → inaceptable para workflows bloqueantes, ideal para nocturnos. El «orden» no es problema (custom_id); el fallback añade complejidad innecesaria."},
{d:4,q:"De un batch de 500 documentos, 30 fallaron por exceder el contexto. ¿Manejo correcto?",o:["Identificar los fallidos por custom_id y reenviar SOLO esos, con chunking de los documentos grandes","Reenviar el batch completo de 500 con documentos truncados","Procesar los 30 manualmente en la UI","Ignorarlos si son menos del 10%"],a:[0],m:false,e:"custom_id correlaciona request/response y permite reenvíos selectivos con la modificación adecuada (chunking)."},
{d:4,q:"Quieres que el código generado por Claude sea revisado con máxima efectividad. ¿Qué arquitectura de review es superior y por qué?",o:["Una segunda instancia independiente sin el contexto de generación — el modelo que generó retiene su razonamiento y no cuestiona sus propias decisiones","La misma sesión que generó, con la instrucción «revisa críticamente tu código»","La misma sesión con extended thinking activado","Tres auto-reviews consecutivos en la misma sesión"],a:[0],m:false,e:"Limitación del self-review: el contexto de razonamiento de la generación sesga la revisión. Instancia independiente > instrucciones de auto-crítica o extended thinking."},
/* ---------- DOMINIO 5 (9) ---------- */
{d:5,q:"En conversaciones largas de soporte con resumen progresivo, el agente empieza a citar montos y fechas equivocados. ¿Fix estructural?",o:["Extraer los hechos transaccionales (montos, fechas, IDs, estados) a un bloque persistente de «case facts» incluido en cada prompt, fuera del historial resumido","Resumir con más frecuencia para que los resúmenes sean más cortos","Prohibir el resumen y mantener siempre el historial completo","Pedir al cliente que repita los datos importantes periódicamente"],a:[0],m:false,e:"El resumen progresivo diluye valores concretos. El bloque de case facts los preserva textualmente fuera del historial condensado."},
{d:5,q:"El agente de síntesis recibe un input muy largo con hallazgos de 6 subagentes y sistemáticamente omite los de las secciones centrales. ¿Fenómeno y mitigación?",o:["Lost in the middle — poner un resumen de hallazgos clave al inicio y organizar con headers de sección explícitos","Overflow de contexto — comprimir todo con resumen agresivo","Sesgo de recencia — poner todo lo importante al final","Alucinación — bajar la temperatura"],a:[0],m:false,e:"Los modelos procesan mejor inicio y final de inputs largos. Mitigación: hallazgos clave al inicio + estructura con headers."},
{d:5,q:"Cada lookup_order devuelve 40+ campos pero solo 5 son relevantes para returns, y el contexto se agota en sesiones multi-orden. ¿Fix?",o:["Recortar los tool outputs a los campos relevantes antes de que se acumulen en el contexto","Aumentar la ventana de contexto del modelo","Resumir la conversación después de cada lookup","Prohibir más de 3 lookups por sesión"],a:[0],m:false,e:"Los tool results verbosos consumen tokens desproporcionados a su relevancia. Trimming a campos relevantes es el patrón correcto (p. ej. vía PostToolUse)."},
{d:5,q:"Un cliente frustrado escribe «quiero hablar con un humano YA». El caso parece simple de resolver. ¿Qué hace el agente?",o:["Escalar de inmediato — la petición explícita de humano se honra sin intentar investigar primero","Resolver el caso primero y ofrecer el humano después","Analizar el sentimiento y escalar solo si supera un umbral","Pedir al cliente que justifique por qué necesita un humano"],a:[0],m:false,e:"Petición explícita de humano = trigger de escalación inmediata. (Distinto de frustración sin petición explícita: ahí se reconoce la frustración y se ofrece resolver.)"},
{d:5,q:"La política de tu empresa cubre ajustes de precio de su propio sitio, pero un cliente pide igualar el precio de un competidor — caso que la política no menciona. ¿Acción del agente?",o:["Escalar a humano: es un gap de política, no un caso que el agente deba resolver por analogía","Aplicar la política de ajustes propios por analogía","Rechazar la petición porque la política no la autoriza explícitamente","Ofrecer un descuento intermedio como compromiso"],a:[0],m:false,e:"Política ambigua o silente sobre el caso = trigger de escalación. Resolver por analogía o rechazar de plano son decisiones de política que no le corresponden al agente."},
{d:5,q:"get_customer devuelve tres clientes que coinciden con el nombre dado. ¿Qué hace el agente?",o:["Pedir identificadores adicionales (email, número de orden) para desambiguar","Elegir el que tenga actividad más reciente","Elegir el primero de la lista","Procesar la operación para los tres por seguridad"],a:[0],m:false,e:"Múltiples matches → clarificación con identificadores adicionales, nunca selección heurística (riesgo de operar sobre la cuenta equivocada)."},
{d:5,q:"El subagente de búsqueda web sufre un timeout investigando un tema complejo. ¿Qué diseño de propagación permite al coordinador recuperarse inteligentemente?",o:["Devolver contexto estructurado: tipo de fallo, query intentada, resultados parciales y enfoques alternativos","Retry automático con backoff dentro del subagente, devolviendo «search unavailable» genérico si se agota","Capturar el timeout y devolver un resultado vacío marcado como éxito","Propagar la excepción a un handler global que termine todo el workflow"],a:[0],m:false,e:"El contexto estructurado permite decidir: retry modificado, alternativa o continuar con parciales. Genérico oculta contexto; vacío-como-éxito suprime; terminar todo es desproporcionado."},
{d:5,q:"Tras horas explorando un codebase enorme, el agente responde con «patrones típicos» genéricos en vez de las clases concretas que descubrió antes. ¿Qué combinaciones combaten esta degradación? (Elige 2)",o:["Mantener scratchpad files con hallazgos clave y referenciarlos en preguntas posteriores","Delegar investigaciones específicas a subagentes mientras el principal solo coordina (y usar /compact en sesiones largas)","Repetir la exploración completa desde cero cada vez que se degrade","Pasar a un modelo con ventana de contexto más grande"],a:[0,1],m:true,e:"Scratchpads persisten hallazgos a través de los límites de contexto; la delegación + /compact evitan que lo verboso sature el contexto principal. Re-explorar es despilfarro; más ventana no arregla la degradación de atención."},
{d:5,q:"Tu pipeline de extracción reporta 97% de accuracy global y quieres reducir el review humano. ¿Paso previo correcto?",o:["Analizar accuracy por tipo de documento y por campo, y muestrear aleatoriamente extracciones de alta confianza — el agregado puede ocultar segmentos con mal desempeño","Reducir el review de inmediato: 97% supera cualquier estándar razonable","Aumentar el umbral de confianza global del 90% al 95%","Duplicar el equipo de revisores para procesar más volumen"],a:[0],m:false,e:"Las métricas agregadas enmascaran fallos por segmento. Validación segmentada + muestreo estratificado + confianza por campo calibrada, antes de automatizar."}

/* ================= ESTADO PERSISTENTE ================= */
const LS = "ccarf_v1";
let S = {studied:{}, srs:{}, practice:{}, exams:[], theme:"dark", examDate:""};
try{ const raw = localStorage.getItem(LS); if(raw) S = Object.assign(S, JSON.parse(raw)); }catch(e){}
function save(){ try{ localStorage.setItem(LS, JSON.stringify(S)); }catch(e){} }
if(S.theme==="light") document.documentElement.setAttribute("data-theme","light");

const $ = s => document.querySelector(s);
const esc = t => t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const today = () => new Date().toISOString().slice(0,10);
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ================= NAVEGACIÓN ================= */
document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click",()=>showView(b.dataset.v)));
function showView(v){
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.v===v));
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
  $("#v-"+v).classList.add("active");
  if(v==="dash") renderDash();
  if(v==="study") renderStudy();
  if(v==="duo"){DU=null;renderDuoHome();}
  if(v==="flash") renderFlashHome();
  if(v==="practice") renderPracticeHome();
  if(v==="exam") renderExamHome();
  window.scrollTo(0,0);
}
$("#themeBtn").addEventListener("click",()=>{
  S.theme = S.theme==="dark"?"light":"dark"; save();
  document.documentElement.setAttribute("data-theme", S.theme==="light"?"light":"");
});

/* ================= DASHBOARD ================= */
function dueCards(){ const t=today(); return CARDS.filter((c,i)=>{const r=S.srs[i]; return !r || r.due<=t;}).length; }
function renderDash(){
  const studied = Object.values(S.studied).filter(Boolean).length;
  const lastExams = S.exams.slice(-5);
  const best = S.exams.length? Math.max(...S.exams.map(e=>e.score)) : null;
  let pr = "";
  for(const d of [1,2,3,4,5]){
    const p = S.practice[d]||{r:0,t:0};
    const pct = p.t? Math.round(100*p.r/p.t) : 0;
    pr += `<tr><td><span class="pill d${d}">D${d}</span> ${DOMAINS[d].name}</td><td>${DOMAINS[d].w}%</td><td>${p.t? pct+"% ("+p.r+"/"+p.t+")":"—"}</td></tr>`;
  }
  let daysLeft = "";
  if(S.examDate){
    const diff = Math.ceil((new Date(S.examDate)-new Date(today()))/86400000);
    daysLeft = diff>=0? `<div class="big" style="color:var(--accent)">${diff}</div><div class="muted">días para el examen</div>` : `<div class="muted">Fecha pasada</div>`;
  }
  $("#v-dash").innerHTML = `
  <div class="grid grid3" style="margin-bottom:14px">
    <div class="card" style="text-align:center"><div class="big">${studied}/${TEMAS.length}</div><div class="muted">temas dominados</div><div class="bar"><div style="width:${Math.round(100*studied/TEMAS.length)}%"></div></div></div>
    <div class="card" style="text-align:center"><div class="big">${dueCards()}</div><div class="muted">tarjetas pendientes hoy</div><button class="btn sm" style="margin-top:8px" onclick="showView('flash')">Repasar</button></div>
    <div class="card" style="text-align:center">${daysLeft || `<div class="muted" style="margin-bottom:6px">Fecha del examen</div><input type="date" id="examDate" value="${S.examDate}" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:7px;border-radius:8px">`}</div>
  </div>
  <div class="card">
    <h3>El examen de un vistazo</h3>
    <p class="muted">60 preguntas · 120 min · aprueba con 720/1000 (escala) · 4 escenarios de un banco de 6 · Pearson VUE · $125</p>
    <table style="margin-top:10px"><tr><th>Dominio</th><th>Peso</th><th>Tu práctica</th></tr>${pr}</table>
  </div>
  <div class="card">
    <h3>Simulacros ${best!==null? `· mejor: <span class="${best>=720?'pass':'fail'}">${best}</span>`:""}</h3>
    ${lastExams.length? "<table><tr><th>Fecha</th><th>Puntaje</th><th>Correctas</th><th>Resultado</th></tr>"+lastExams.map(e=>`<tr><td>${e.date}</td><td>${e.score}</td><td>${e.right}/${e.total}</td><td class="${e.score>=720?'pass':'fail'}">${e.score>=720?"APROBADO":"NO APROBADO"}</td></tr>`).join("")+"</table>" : `<p class="muted">Aún no has hecho simulacros. <a href="#" onclick="showView('exam');return false" style="color:var(--accent)">Empieza uno →</a></p>`}
  </div>
  <div class="card">
    <h3>Reglas de oro (memorizar)</h3>
    <ul style="font-size:.88rem;margin-left:18px;line-height:1.7">
      <li>Garantía determinística → <b>código</b> (hooks, gates, tool_use+schema). Mejora probabilística → <b>prompt</b> (criterios, few-shot).</li>
      <li>La descripción de la tool es el mecanismo #1 de selección → ante misrouting, primero mejora descripciones.</li>
      <li>Subagentes: contexto aislado, paso explícito, resultados destilados, comunicación vía coordinador.</li>
      <li>Elige la solución <b>proporcionada</b>: «primer paso» = bajo esfuerzo, alto impacto — no infraestructura nueva.</li>
      <li>Batch = barato y lento (24h, sin SLA) → nunca para workflows bloqueantes.</li>
      <li>Nullable > «no inventes»; el schema elimina errores de sintaxis, no semánticos.</li>
      <li>Review independiente > auto-review; multi-pass > más contexto.</li>
      <li>Distractores casi siempre incorrectos: confianza auto-reportada, análisis de sentimiento, instrucciones vagas, tope de iteraciones como parada, features inexistentes (CLAUDE_HEADLESS, --batch), «modelo más grande».</li>
    </ul>
  </div>`;
  const ed = $("#examDate");
  if(ed) ed.addEventListener("change",e=>{S.examDate=e.target.value; save(); renderDash();});
}

/* ================= ESTUDIO ================= */
function renderStudy(){
  let html = `<h2>Guía de estudio</h2><p class="muted" style="margin-bottom:14px">30 temas basados en el Exam Guide oficial v1.0. Marca cada tema cuando lo domines.</p>`;
  for(const d of [1,2,3,4,5]){
    const temas = TEMAS.filter(t=>t.d===d);
    const done = temas.filter(t=>S.studied[t.id]).length;
    html += `<div class="domacc" id="dom${d}">
      <button onclick="this.parentElement.classList.toggle('open')">
        <span class="pill d${d}">D${d} · ${DOMAINS[d].w}%</span> ${DOMAINS[d].name}
        <span class="muted" style="margin-left:auto">${done}/${temas.length}</span>
      </button>
      <div class="body">` +
      temas.map(t=>{const ex=EXTRA[t.id]||{};return `<div class="tema" id="tema-${t.id.replace(".","_")}">
        <button onclick="this.parentElement.classList.toggle('open')">
          <span class="check ${S.studied[t.id]?'done':''}" onclick="event.stopPropagation();toggleStudied('${t.id}')">${S.studied[t.id]?"✓":""}</span>
          <span>${ex.e||""} <b>${t.id}</b> — ${t.t}</span>
        </button>
        <div class="content">
          ${ex.a?`<div class="analogy"><div class="emo">${ex.e}</div><div><b>Imagínalo así:</b> ${ex.a}</div></div>`:""}
          ${ex.g?`<div class="diagram">${ex.g()}</div>`:""}
          ${t.x}
          ${ex.f?`<div class="frase">💡 ${ex.f}</div>`:""}
        </div>
      </div>`}).join("") +
      `</div></div>`;
  }
  $("#v-study").innerHTML = html;
}
function toggleStudied(id){
  S.studied[id] = !S.studied[id]; save();
  const el = document.getElementById("tema-"+id.replace(".","_"));
  const wasOpen = el && el.classList.contains("open");
  const openDoms = [1,2,3,4,5].filter(d=>{const x=document.getElementById("dom"+d);return x&&x.classList.contains("open");});
  renderStudy();
  openDoms.forEach(d=>{const x=document.getElementById("dom"+d); if(x)x.classList.add("open");});
  if(wasOpen){const x=document.getElementById("tema-"+id.replace(".","_")); if(x)x.classList.add("open");}
}

/* ================= FLASHCARDS (SRS: cajas 0-4, intervalos 0/1/3/7/14 días) ================= */
const INTERVALS = [0,1,3,7,14];
let flashQueue = [], flashIdx = 0, flashShown = false;
function renderFlashHome(){
  const due = dueCards();
  const counts = [0,0,0,0,0];
  CARDS.forEach((c,i)=>{const b=(S.srs[i]&&S.srs[i].box)||0; counts[Math.min(b,4)]++;});
  $("#v-flash").innerHTML = `<h2>Flashcards — repetición espaciada</h2>
  <div class="card">
    <p>${CARDS.length} tarjetas · <b>${due} pendientes hoy</b></p>
    <p class="muted" style="margin:6px 0 12px">Intervalos: fallo → hoy mismo · bien → +${INTERVALS[1]}, +${INTERVALS[2]}, +${INTERVALS[3]}, +${INTERVALS[4]} días según nivel. Cajas: ${counts.map((c,i)=>`N${i}: ${c}`).join(" · ")}</p>
    <div class="rowbtns" style="justify-content:flex-start">
      <button class="btn" ${due?"":"disabled"} onclick="startFlash(false)">Repasar pendientes (${due})</button>
      <button class="btn sec" onclick="startFlash(true)">Repasar todas</button>
    </div>
  </div>`;
}
function startFlash(all){
  const t = today();
  flashQueue = [];
  CARDS.forEach((c,i)=>{ const r=S.srs[i]; if(all || !r || r.due<=t) flashQueue.push(i); });
  flashQueue = shuffle(flashQueue);
  flashIdx = 0; flashShown = false;
  renderFlashCard();
}
function renderFlashCard(){
  if(flashIdx >= flashQueue.length){
    $("#v-flash").innerHTML = `<div class="card" style="text-align:center;padding:40px"><div class="big">🎉</div><h3>Sesión completada</h3><p class="muted">${flashQueue.length} tarjetas repasadas.</p><div class="rowbtns"><button class="btn" onclick="renderFlashHome()">Volver</button></div></div>`;
    return;
  }
  const i = flashQueue[flashIdx], c = CARDS[i];
  $("#v-flash").innerHTML = `
  <div class="muted" style="margin-bottom:8px">Tarjeta ${flashIdx+1} / ${flashQueue.length} · <span class="pill d${c.d}">D${c.d}</span></div>
  <div class="card flash" onclick="flipFlash()">
    <div class="q">${esc(c.q)}</div>
    ${flashShown? `<div class="a">${esc(c.a)}</div>` : `<div class="muted" style="margin-top:16px">(toca para ver la respuesta)</div>`}
  </div>
  ${flashShown? `<div class="rowbtns">
    <button class="btn sec" style="border-color:var(--red);color:var(--red)" onclick="gradeFlash(0)">✗ Fallé</button>
    <button class="btn sec" onclick="gradeFlash(1)">~ Difícil</button>
    <button class="btn" style="background:var(--green)" onclick="gradeFlash(2)">✓ Bien</button>
  </div>`:""}`;
}

function duoDone(k){return k.startsWith("cp")? !!S.duo.cp[k.slice(2)] : !!S.duo.done[k];}

function exBlank(k){const b=BLANKS[k];return{type:"mc",q:b.t.replace("___","______"),c:b.c,opts:shuffle([b.c].concat(b.w))};}
function exMcCards(d,n){
  const pool=shuffle(CARDS.map((c,i)=>i).filter(i=>CARDS[i].d===d));const out=[];
  for(let j=0;j<n&&j<pool.length;j++){
    const ci=pool[j];
    const wrong=shuffle(pool.filter(x=>x!==ci)).slice(0,2).map(i=>CARDS[i].a);
    out.push({type:"mc",q:CARDS[ci].q,c:CARDS[ci].a,opts:shuffle([CARDS[ci].a].concat(wrong))});
  }
  return out;
}
function exMatch(d,k){
  let ts=TEMAS.filter(t=>t.d===d&&EXTRA[t.id]);
  ts=shuffle(ts).slice(0,4);
  if(k&&!ts.find(t=>t.id===k)){const t=TEMAS.find(x=>x.id===k);if(t)ts[0]=t;}
  const pairs=ts.map(t=>({l:EXTRA[t.id].e+" "+t.t,r:EXTRA[t.id].f}));
  return{type:"match",pairs,right:shuffle(pairs.map((p,i)=>i)),doneL:{},selL:-1};
}
function exExam(d){
  const pool=QUESTIONS.map((q,i)=>i).filter(i=>QUESTIONS[i].d===d&&!QUESTIONS[i].m);
  const q=QUESTIONS[pool[Math.floor(Math.random()*pool.length)]];
  return{type:"mc",q:q.q,c:q.o[q.a[0]],opts:shuffle(q.o.slice()),exp:q.e};
}

function startDuo(k){
  const ex=[];
  if(k.startsWith("cp")){
    const d=+k.slice(2);
    for(let i=0;i<6;i++) ex.push(exExam(d));
  }else{
    const t=TEMAS.find(x=>x.id===k), d=t.d;
    ex.push(exBlank(k));
    exMcCards(d,2).forEach(e=>ex.push(e));
    if(ORDER[k]) ex.push({type:"order",steps:ORDER[k]}); else ex.push(exMatch(d,k));
    ex.push(exExam(d));
  }
  DU={k,queue:ex,idx:0,hearts:3,xp:0,answered:false,ok:false,sel:null,seq:[]};
  renderDuo();
}

      :`<div class="rowbtns" style="justify-content:flex-end"><button class="btn" ${DU.sel==null?"disabled":""} onclick="duoCheck()">Comprobar</button></div>`;
  }else if(e.type==="order"){
    body=`<p style="font-weight:700;margin-bottom:8px">Toca los pasos en el orden correcto:</p>
      <div class="ordseq">${DU.seq.length?DU.seq.map((si,n)=>`<div class="ordpick">${n+1}. ${esc(e.steps[si])}</div>`).join(""):'<span class="muted">toca los pasos abajo…</span>'}</div>`+
      e.shuf.map(si=>`<button class="qopt" ${DU.seq.includes(si)||DU.answered?"disabled":""} onclick="duoPickOrd(${si})">${esc(e.steps[si])}</button>`).join("")+
      (DU.seq.length&&!DU.answered?`<div class="rowbtns" style="justify-content:flex-start"><button class="btn sec sm" onclick="DU.seq=[];renderDuo()">Reiniciar</button></div>`:"");
    foot=DU.answered
      ?`<div class="duofeed ${DU.ok?'ok':'bad'}"><div>${DU.ok?"¡Orden perfecto! 🎉":"Orden correcto:<br><span class='muted'>"+e.steps.map((s,i)=>(i+1)+". "+esc(s)).join("<br>")+"</span>"}</div><button class="btn" onclick="duoNext()">Continuar</button></div>`
      :`<div class="rowbtns" style="justify-content:flex-end"><button class="btn" ${DU.seq.length===e.steps.length?"":"disabled"} onclick="duoCheckOrd()">Comprobar</button></div>`;
  }else if(e.type==="match"){
    body=`<p style="font-weight:700;margin-bottom:10px">Empareja cada tema con su frase clave:</p><div class="matchcols"><div>`+
      e.pairs.map((p,i)=>`<button class="pairbtn ${e.doneL[i]?'ok':''} ${e.selL===i?'sel':''}" ${e.doneL[i]?"disabled":""} onclick="duoSelL(${i})">${esc(p.l)}</button>`).join("")+
      `</div><div>`+
      e.right.map(ri=>`<button class="pairbtn ${e.doneL[ri]?'ok':''}" ${e.doneL[ri]?"disabled":""} onclick="duoSelR(${ri})">${esc(e.pairs[ri].r)}</button>`).join("")+
      `</div></div><p class="muted" style="font-size:.78rem">Toca uno de la izquierda y luego su pareja de la derecha.</p>`;
  }
  $("#v-duo").innerHTML=`
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
    <button class="btn sec sm" onclick="if(confirm('¿Salir de la lección? Perderás el progreso de esta lección.')){DU=null;renderDuoHome()}">✕</button>
    <div class="bar" style="flex:1;height:12px"><div style="width:${prog}%"></div></div>
    <div class="hearts">${"❤️".repeat(DU.hearts)}${"🤍".repeat(3-DU.hearts)}</div>
  </div>
  <div class="card">${body}${foot}</div>`;
}
function duoSel(i){if(DU.answered)return;DU.sel=i;renderDuo();}
function duoCheck(){
  const e=DU.queue[DU.idx];
  DU.ok=(e.opts[DU.sel]===e.c);
  if(DU.ok){DU.xp+=e.requeued?5:10;}
  else{DU.hearts--;DU.queue.push(Object.assign({},e,{requeued:true}));}
  DU.answered=true;renderDuo();
}
function duoPickOrd(si){if(DU.answered)return;DU.seq.push(si);renderDuo();}
function duoCheckOrd(){
  const e=DU.queue[DU.idx];
  DU.ok=DU.seq.every((si,n)=>si===n);
  if(DU.ok){DU.xp+=e.requeued?5:10;}
  else{DU.hearts--;DU.queue.push(Object.assign({},e,{requeued:true,shuf:null}));}
  DU.answered=true;renderDuo();
}
function duoSelL(i){const e=DU.queue[DU.idx];e.selL=(e.selL===i?-1:i);renderDuo();}
function duoSelR(ri){
  const e=DU.queue[DU.idx];if(e.selL<0)return;
  if(ri===e.selL){
    e.doneL[ri]=true;e.selL=-1;
    if(Object.keys(e.doneL).length===e.pairs.length){DU.xp+=10;DU.idx++;DU.answered=false;DU.sel=null;DU.seq=[];}
  }else{e.selL=-1;}
  renderDuo();
}
function duoNext(){DU.idx++;DU.answered=false;DU.sel=null;DU.seq=[];renderDuo();}
function finishDuo(){
  const k=DU.k,xp=DU.xp,perfect=(DU.hearts===3);
  if(k.startsWith("cp"))S.duo.cp[k.slice(2)]=true;else S.duo.done[k]=true;
  S.duo.xp+=xp;
  const t=today();
  if(S.duo.last!==t){
    const y=new Date();y.setDate(y.getDate()-1);
    S.duo.streak=(S.duo.last===y.toISOString().slice(0,10))?S.duo.streak+1:1;
    S.duo.last=t;
  }
  save();DU=null;
  $("#v-duo").innerHTML=`<div class="card" style="text-align:center;padding:44px">
    <div style="font-size:3.4rem">${perfect?"🌟":"🎉"}</div>
    <h2>¡Lección completada!</h2>
    <p style="font-size:1.15rem;margin:10px 0">⚡ +${xp} XP · 🔥 racha: ${S.duo.streak} día${S.duo.streak===1?"":"s"}${perfect?" · 💯 ¡sin errores!":""}</p>
    <div class="rowbtns"><button class="btn" onclick="renderDuoHome()">Seguir el camino 🦉</button></div></div>`;
  window.scrollTo(0,0);
}

/* init */
renderDash();
</script>
</body>
</html>
